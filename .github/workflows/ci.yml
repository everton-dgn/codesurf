name: ci
run-name: CI ${{ github.ref_name }}

# Pre-merge gate: typecheck + tests on every PR and push to main, so regressions
# are caught before they land (previously tests only ran at release-tag time).
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Install relay package deps
        run: npm --prefix packages/contex-relay install

      - name: Run relay test suite
        run: npm run test:relay
