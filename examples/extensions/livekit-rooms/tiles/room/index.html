<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--ct-bg, transparent);
    color: var(--ct-text, #111);
    font-size: 12px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Top bar ─────────────────────────────────────────────────── */
  .topbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--ct-border, rgba(0,0,0,0.09));
    flex-shrink: 0;
  }
  .topbar .room-name { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .topbar .participant-count { font-size: 11px; color: var(--ct-dim, #64748b); }

  .ctrl-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--ct-border, rgba(0,0,0,0.09));
    background: var(--ct-panel, rgba(0,0,0,0.04));
    color: var(--ct-muted, #444); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { background: var(--ct-panel-2, rgba(0,0,0,0.08)); }
  .ctrl-btn.active { background: var(--ct-accent, #4f46e5); color: #fff; border-color: transparent; }
  .ctrl-btn.danger { background: var(--ct-danger, #dc2626); color: #fff; border-color: transparent; }
  .ctrl-btn.danger:hover { opacity: 0.9; }
  .ctrl-btn.muted-state { background: rgba(220,38,38,0.12); color: var(--ct-danger, #dc2626); border-color: rgba(220,38,38,0.2); }

  /* ── Join screen ─────────────────────────────────────────────── */
  .join-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px; padding: 24px;
  }
  .join-screen h3 { font-size: 15px; font-weight: 600; }
  .join-screen .sub { font-size: 12px; color: var(--ct-dim, #64748b); }

  .join-field {
    display: flex; gap: 6px; width: 100%; max-width: 320px;
  }
  .join-field input {
    flex: 1; background: var(--ct-panel, rgba(0,0,0,0.04));
    border: 1px solid var(--ct-border, rgba(0,0,0,0.09));
    border-radius: 6px; color: var(--ct-text, #111);
    font-size: 12px; font-family: inherit; padding: 8px 12px; outline: none;
  }
  .join-field input:focus { border-color: var(--ct-accent, #4f46e5); }

  .join-btn {
    padding: 8px 20px; border-radius: 8px; border: none;
    background: var(--ct-accent, #4f46e5); color: #fff;
    font-size: 13px; font-weight: 500; font-family: inherit;
    cursor: pointer; transition: opacity 0.15s;
  }
  .join-btn:hover { opacity: 0.9; }
  .join-btn:disabled { opacity: 0.4; cursor: default; }

  .error-msg { color: var(--ct-danger, #dc2626); font-size: 12px; max-width: 320px; text-align: center; }

  /* ── Video grid ──────────────────────────────────────────────── */
  .video-area {
    flex: 1; display: grid; gap: 4px; padding: 4px;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    grid-auto-rows: 1fr;
    overflow: hidden;
  }

  .video-cell {
    position: relative; background: var(--ct-panel, rgba(0,0,0,0.04));
    border-radius: 8px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    min-height: 120px;
  }
  .video-cell video {
    width: 100%; height: 100%; object-fit: cover;
    border-radius: 8px;
  }
  .video-cell .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--ct-accent-s, rgba(79,70,229,0.1));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 600; color: var(--ct-accent, #4f46e5);
  }
  .video-cell .label {
    position: absolute; bottom: 6px; left: 8px;
    background: rgba(0,0,0,0.6); color: #fff;
    padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 500;
  }
  .video-cell .speaking-ring {
    position: absolute; inset: 0; border: 2px solid var(--ct-accent, #4f46e5);
    border-radius: 8px; opacity: 0; transition: opacity 0.2s;
    pointer-events: none;
  }
  .video-cell.speaking .speaking-ring { opacity: 1; }

  /* ── Chat panel ──────────────────────────────────────────────── */
  .chat-panel {
    height: 180px; min-height: 100px;
    border-top: 1px solid var(--ct-border, rgba(0,0,0,0.09));
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .chat-header {
    padding: 6px 12px; font-size: 11px; font-weight: 600;
    color: var(--ct-dim, #64748b); border-bottom: 1px solid var(--ct-border, rgba(0,0,0,0.09));
    text-transform: uppercase; letter-spacing: 1px;
  }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 8px 12px;
  }
  .chat-msg { margin-bottom: 6px; }
  .chat-msg .sender { font-weight: 600; font-size: 11px; color: var(--ct-accent, #4f46e5); }
  .chat-msg .text { font-size: 12px; color: var(--ct-text, #111); margin-top: 1px; word-break: break-word; }
  .chat-msg .ts { font-size: 10px; color: var(--ct-dim, #64748b); margin-left: 6px; }

  .chat-input-row {
    display: flex; gap: 6px; padding: 8px 12px;
    border-top: 1px solid var(--ct-border, rgba(0,0,0,0.09));
  }
  .chat-input-row input {
    flex: 1; background: var(--ct-panel, rgba(0,0,0,0.04));
    border: 1px solid var(--ct-border, rgba(0,0,0,0.09));
    border-radius: 6px; color: var(--ct-text, #111);
    font-size: 12px; font-family: inherit; padding: 6px 10px; outline: none;
  }
  .chat-input-row input:focus { border-color: var(--ct-accent, #4f46e5); }
  .chat-input-row button {
    padding: 6px 12px; border-radius: 6px; border: none;
    background: var(--ct-accent, #4f46e5); color: #fff;
    font-size: 12px; font-family: inherit; cursor: pointer;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--ct-border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Join screen -->
<div id="joinScreen" class="join-screen">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--ct-accent, #4f46e5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    <line x1="12" y1="19" x2="12" y2="23"/>
    <line x1="8" y1="23" x2="16" y2="23"/>
  </svg>
  <h3 id="joinTitle">Join Room</h3>
  <div class="sub" id="joinSub">Enter your display name to join</div>
  <div class="join-field">
    <input id="roomInput" type="text" placeholder="Room name" />
  </div>
  <div class="join-field">
    <input id="identityInput" type="text" placeholder="Your name" />
  </div>
  <button class="join-btn" id="joinBtn">Join Room</button>
  <div class="error-msg" id="joinError" style="display:none"></div>
</div>

<!-- In-room view -->
<div id="roomView" style="display:none; flex:1; display:none; flex-direction:column;">
  <div class="topbar">
    <span class="room-name" id="roomLabel"></span>
    <span class="participant-count" id="pCount">0</span>
    <button class="ctrl-btn" id="micBtn" title="Toggle Microphone">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="camBtn" title="Toggle Camera">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"/>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="screenBtn" title="Share Screen">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
    </button>
    <button class="ctrl-btn danger" id="leaveBtn" title="Leave Room">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
        <line x1="12" y1="2" x2="12" y2="12"/>
      </svg>
    </button>
  </div>

  <div class="video-area" id="videoGrid"></div>
  <div id="audioSink" style="display:none"></div>

  <div class="chat-panel">
    <div class="chat-header">Chat</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input id="chatInput" type="text" placeholder="Type a message..." />
      <button id="chatSendBtn">Send</button>
    </div>
  </div>
</div>

<!-- LiveKit Client SDK from CDN -->
<script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>

<script>
  // State
  var room = null
  var currentRoomName = ''
  var currentIdentity = ''
  var micEnabled = true
  var camEnabled = false
  var chatMessages = []
  var participants = new Map()

  // Elements
  var joinScreen = document.getElementById('joinScreen')
  var roomView = document.getElementById('roomView')
  var joinTitle = document.getElementById('joinTitle')
  var joinSub = document.getElementById('joinSub')
  var roomInput = document.getElementById('roomInput')
  var identityInput = document.getElementById('identityInput')
  var joinBtn = document.getElementById('joinBtn')
  var joinError = document.getElementById('joinError')
  var roomLabel = document.getElementById('roomLabel')
  var pCount = document.getElementById('pCount')
  var videoGrid = document.getElementById('videoGrid')
  var audioSink = document.getElementById('audioSink')
  var chatMessagesEl = document.getElementById('chatMessages')
  var chatInput = document.getElementById('chatInput')
  var micBtn = document.getElementById('micBtn')
  var camBtn = document.getElementById('camBtn')
  var screenBtn = document.getElementById('screenBtn')
  var leaveBtn = document.getElementById('leaveBtn')

  var LivekitClient = window.LivekitClient || window.livekit
  var AUDIO_CAPTURE_OPTIONS = {
    echoCancellation: true,
    noiseSuppression: true,
    autoGainControl: true,
  }

  function setLocalMicEnabled(enabled) {
    if (!room || !room.localParticipant) return Promise.resolve()
    return room.localParticipant.setMicrophoneEnabled(enabled, AUDIO_CAPTURE_OPTIONS)
  }

  function showError(msg) {
    joinError.textContent = msg
    joinError.style.display = msg ? '' : 'none'
  }

  function updateParticipantCount() {
    if (!room) return
    var count = room.remoteParticipants.size + 1
    pCount.textContent = count + ' participant' + (count !== 1 ? 's' : '')
  }

  // ── Video grid rendering ────────────────────────────────────────────────

  function addParticipantCell(participant, isLocal) {
    var cell = document.createElement('div')
    cell.className = 'video-cell'
    cell.dataset.sid = participant.sid || participant.identity

    // Try to find a video track
    var videoTrack = null
    participant.trackPublications.forEach(function(pub) {
      if (pub.track && (pub.kind === 'video' || pub.source === LivekitClient.Track.Source.Camera || pub.source === LivekitClient.Track.Source.ScreenShare)) {
        if (!pub.isMuted) videoTrack = pub.track
      }
    })

    if (videoTrack) {
      var videoEl = videoTrack.attach()
      videoEl.style.width = '100%'
      videoEl.style.height = '100%'
      videoEl.style.objectFit = 'cover'
      if (isLocal) videoEl.style.transform = 'scaleX(-1)'
      cell.appendChild(videoEl)
    } else {
      // Avatar fallback
      var avatar = document.createElement('div')
      avatar.className = 'avatar'
      avatar.textContent = (participant.identity || '?')[0].toUpperCase()
      cell.appendChild(avatar)
    }

    // Name label
    var label = document.createElement('div')
    label.className = 'label'
    label.textContent = (participant.identity || 'Unknown') + (isLocal ? ' (you)' : '')
    cell.appendChild(label)

    // Speaking ring
    var ring = document.createElement('div')
    ring.className = 'speaking-ring'
    cell.appendChild(ring)

    videoGrid.appendChild(cell)
  }

  function syncRemoteAudio() {
    while (audioSink.firstChild) audioSink.removeChild(audioSink.firstChild)
    if (!room) return

    room.remoteParticipants.forEach(function(participant) {
      participant.trackPublications.forEach(function(pub) {
        if (!pub.track || pub.kind !== 'audio' || pub.isMuted) return
        var audioEl = pub.track.attach()
        audioEl.autoplay = true
        audioEl.playsInline = true
        audioEl.muted = false
        audioEl.volume = 1
        audioSink.appendChild(audioEl)
        if (typeof audioEl.play === 'function') {
          audioEl.play().catch(function() {})
        }
      })
    })
  }

  function renderGrid() {
    while (videoGrid.firstChild) videoGrid.removeChild(videoGrid.firstChild)
    if (!room) return

    // Local participant
    addParticipantCell(room.localParticipant, true)

    // Remote participants
    room.remoteParticipants.forEach(function(p) {
      addParticipantCell(p, false)
    })

    syncRemoteAudio()
    updateParticipantCount()
  }

  // ── Chat ────────────────────────────────────────────────────────────────

  function addChatMessage(sender, text) {
    chatMessages.push({ sender: sender, text: text, ts: new Date() })
    if (chatMessages.length > 200) chatMessages = chatMessages.slice(-200)
    if (window.contex && window.contex.tile) {
      window.contex.tile.setState('chatMessages', chatMessages.slice(-100)).catch(function() {})
    }
    renderChat()
  }

  function renderChat() {
    while (chatMessagesEl.firstChild) chatMessagesEl.removeChild(chatMessagesEl.firstChild)
    chatMessages.forEach(function(msg) {
      var div = document.createElement('div')
      div.className = 'chat-msg'
      var s = document.createElement('span')
      s.className = 'sender'
      s.textContent = msg.sender
      var ts = document.createElement('span')
      ts.className = 'ts'
      var d = msg.ts
      ts.textContent = (d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0'))
      var t = document.createElement('div')
      t.className = 'text'
      t.textContent = msg.text
      div.appendChild(s)
      div.appendChild(ts)
      div.appendChild(t)
      chatMessagesEl.appendChild(div)
    })
    chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight
  }

  function sendChatText(text, sender, echoLocal) {
    var body = String(text || '').trim()
    if (!body || !room) return false
    var label = String(sender || currentIdentity || 'Agent').trim() || currentIdentity || 'Agent'
    var data = new TextEncoder().encode(JSON.stringify({ type: 'chat', sender: label, text: body }))
    room.localParticipant.publishData(data, { reliable: true })
    if (echoLocal !== false) {
      addChatMessage(label, body)
    }
    return true
  }

  function sendChat() {
    var text = chatInput.value.trim()
    if (!text || !room) return
    chatInput.value = ''
    sendChatText(text, currentIdentity, true)
  }

  document.getElementById('chatSendBtn').addEventListener('click', sendChat)
  chatInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendChat() })

  // ── Join flow ───────────────────────────────────────────────────────────

  async function joinRoom(roomName, identity) {
    showError('')
    joinBtn.disabled = true
    joinBtn.textContent = 'Connecting...'

    try {
      // Get token from backend
      if (!window.contex) throw new Error('Bridge not ready')
      var raw = await window.contex.ext.invoke('generateToken', JSON.stringify({ identity: identity, room: roomName }))
      var data = typeof raw === 'string' ? JSON.parse(raw) : raw
      var token = data.token
      var serverUrl = data.serverUrl

      // Create room
      room = new LivekitClient.Room({
        adaptiveStream: true,
        dynacast: true,
        audioCaptureDefaults: AUDIO_CAPTURE_OPTIONS,
      })

      // Wire up events
      room.on(LivekitClient.RoomEvent.ParticipantConnected, function(p) { renderGrid() })
      room.on(LivekitClient.RoomEvent.ParticipantDisconnected, function(p) { renderGrid() })
      room.on(LivekitClient.RoomEvent.TrackSubscribed, function(track, pub, p) { renderGrid() })
      room.on(LivekitClient.RoomEvent.TrackUnsubscribed, function(track, pub, p) { renderGrid() })
      room.on(LivekitClient.RoomEvent.TrackMuted, function(pub, p) { renderGrid() })
      room.on(LivekitClient.RoomEvent.TrackUnmuted, function(pub, p) { renderGrid() })
      room.on(LivekitClient.RoomEvent.LocalTrackPublished, function() { renderGrid() })
      room.on(LivekitClient.RoomEvent.LocalTrackUnpublished, function() { renderGrid() })

      room.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, function(speakers) {
        // Clear all
        document.querySelectorAll('.video-cell').forEach(function(c) { c.classList.remove('speaking') })
        speakers.forEach(function(p) {
          var c = document.querySelector('.video-cell[data-sid="' + (p.sid || p.identity) + '"]')
          if (c) c.classList.add('speaking')
        })
      })

      room.on(LivekitClient.RoomEvent.DataReceived, function(payload, participant) {
        try {
          var str = new TextDecoder().decode(payload)
          var msg = JSON.parse(str)
          if (msg.type === 'chat') {
            addChatMessage(msg.sender || (participant ? participant.identity : 'Unknown'), msg.text)
          }
        } catch (e) {}
      })

      room.on(LivekitClient.RoomEvent.Disconnected, function() {
        leaveRoom()
      })

      // Connect
      await room.connect(serverUrl, token)

      currentRoomName = roomName
      currentIdentity = identity

      // Switch to room view
      joinScreen.style.display = 'none'
      roomView.style.display = 'flex'
      roomLabel.textContent = roomName

      try {
        await setLocalMicEnabled(true)
        micEnabled = true
      } catch (err) {
        micEnabled = false
        addChatMessage('System', 'Microphone access was denied. Join succeeded without mic.')
      }
      updateMicBtn()

      // Save state
      if (window.contex) {
        window.contex.tile.setState('room', roomName)
        window.contex.tile.setState('identity', identity)
        window.contex.context.set('ctx:lk-room', { name: roomName, identity: identity, joined: true })
      }

      renderGrid()

    } catch (e) {
      showError(e.message || 'Failed to join')
      joinBtn.disabled = false
      joinBtn.textContent = 'Join Room'
    }
  }

  function leaveRoom() {
    if (room) {
      room.disconnect()
      room = null
    }
    while (audioSink.firstChild) audioSink.removeChild(audioSink.firstChild)
    currentRoomName = ''
    chatMessages = []
    joinScreen.style.display = ''
    roomView.style.display = 'none'
    joinBtn.disabled = false
    joinBtn.textContent = 'Join Room'
    if (window.contex) {
      window.contex.context.set('ctx:lk-room', { joined: false })
    }
  }

  function updateMicBtn() {
    micBtn.className = 'ctrl-btn' + (micEnabled ? ' active' : ' muted-state')
    micBtn.title = micEnabled ? 'Mute microphone' : 'Unmute microphone'
  }

  function updateCamBtn() {
    camBtn.className = 'ctrl-btn' + (camEnabled ? ' active' : '')
  }

  // ── Controls ────────────────────────────────────────────────────────────

  joinBtn.addEventListener('click', function() {
    var rn = roomInput.value.trim()
    var id = identityInput.value.trim()
    if (!rn) { showError('Room name required'); return }
    if (!id) { showError('Name required'); return }
    joinRoom(rn, id)
  })

  micBtn.addEventListener('click', async function() {
    if (!room) return
    var nextEnabled = !micEnabled
    try {
      await setLocalMicEnabled(nextEnabled)
      micEnabled = nextEnabled
      updateMicBtn()
    } catch (err) {
      addChatMessage('System', (err && err.message) ? err.message : 'Microphone access was denied.')
    }
  })

  camBtn.addEventListener('click', async function() {
    if (!room) return
    var nextEnabled = !camEnabled
    try {
      await room.localParticipant.setCameraEnabled(nextEnabled)
      camEnabled = nextEnabled
      updateCamBtn()
      setTimeout(renderGrid, 500)
    } catch (err) {
      addChatMessage('System', (err && err.message) ? err.message : 'Camera access was denied.')
    }
  })

  screenBtn.addEventListener('click', async function() {
    if (!room) return
    try {
      await room.localParticipant.setScreenShareEnabled(true)
      setTimeout(renderGrid, 500)
    } catch (e) {
      addChatMessage('System', (e && e.message) ? e.message : 'Screen-share access was denied.')
    }
  })

  leaveBtn.addEventListener('click', leaveRoom)

  // ── Init ────────────────────────────────────────────────────────────────

  function init() {
    // Check if we have a room name from state or context
    if (!window.contex) return

    Promise.all([
      window.contex.tile.getState('room').catch(function() { return null }),
      window.contex.tile.getState('identity').catch(function() { return null }),
      window.contex.settings.get('defaultIdentity').catch(function() { return null }),
      window.contex.tile.getState('chatMessages').catch(function() { return [] }),
    ]).then(function(results) {
      var savedRoom = results[0]
      var savedIdentity = results[1]
      var defaultIdentity = results[2]
      var savedMessages = results[3]

      if (savedRoom) roomInput.value = savedRoom
      if (savedIdentity) identityInput.value = savedIdentity
      else if (defaultIdentity) identityInput.value = defaultIdentity
      chatMessages = Array.isArray(savedMessages) ? savedMessages.map(function(entry) {
        return {
          sender: entry && entry.sender ? entry.sender : 'Unknown',
          text: entry && entry.text ? entry.text : '',
          ts: entry && entry.ts ? new Date(entry.ts) : new Date(),
        }
      }) : []
      renderChat()
    })

    // Listen for context changes (room selection from rooms tile)
    if (window.contex.context) {
      window.contex.context.onPeerContextChanged(function(data) {
        if (data.key === 'ctx:lk-room' && data.value && data.value.action === 'join' && data.value.name) {
          roomInput.value = data.value.name
          joinTitle.textContent = 'Join ' + data.value.name
        }
      })
    }

    if (window.contex.bus) {
      window.contex.bus.subscribe('lk-chat', function(event) {
        var payload = event && event.payload ? event.payload : event
        var data = payload && payload.payload ? payload.payload : payload
        if (!payload || payload.action !== 'sendChat' || !data || !data.text) return
        if (!room) return
        if (data.room && currentRoomName && data.room !== currentRoomName) return
        sendChatText(data.text, data.sender || 'Agent', true)
      })
    }

    // Register actions
    if (window.contex.actions) {
      window.contex.actions.register('joinRoom', 'Join a LiveKit room', function(params) {
        if (params && params.room) {
          roomInput.value = params.room
          if (params.identity) identityInput.value = params.identity
          var id = identityInput.value.trim()
          if (id) joinRoom(params.room, id)
        }
      })
      window.contex.actions.register('leaveRoom', 'Leave the current room', function() { leaveRoom() })
      window.contex.actions.register('toggleMic', 'Toggle microphone', function() { micBtn.click() })
      window.contex.actions.register('toggleCam', 'Toggle camera', function() { camBtn.click() })
      window.contex.actions.register('sendChat', 'Send a text message into the current room', function(params) {
        if (!params || !params.text) return
        sendChatText(params.text, params.sender || 'Agent', true)
      })
    }
  }

  if (window.contex) init()
  else window.addEventListener('message', function handler(e) {
    if (e.data?.type === 'contex-bridge-ready') {
      window.removeEventListener('message', handler)
      setTimeout(init, 50)
    }
  })
</script>
</body>
</html>
