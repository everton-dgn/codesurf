<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Local Models</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* --ct-* tokens are injected (theme-aware) by the shared kit; these are 1:1 aliases referenced by name in CSS + JS. */
      --bg:        var(--ct-bg);
      --surface:   var(--ct-panel);
      --surface2:  var(--ct-panel-2);
      --border:    var(--ct-border);
      --text:      var(--ct-text);
      --muted:     var(--ct-dim);
      --accent:    var(--ct-accent);
      --accent-bg: var(--ct-accent-s);
      --green:     var(--ct-success);
      --green-bg:  color-mix(in srgb, var(--ct-success) 14%, transparent);
      --amber:     var(--ct-warning);
      --amber-bg:  color-mix(in srgb, var(--ct-warning) 14%, transparent);
      --blue:      var(--ct-accent);
      --blue-bg:   var(--ct-accent-s);
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      height: 44px;
    }
    .toolbar-icon { color: var(--accent); flex-shrink: 0; }
    .toolbar-title { font-weight: 600; font-size: 13px; }
    .spacer { flex: 1; }
    .search-wrap { position: relative; display: flex; align-items: center; }
    .search-icon { position: absolute; left: 8px; color: var(--muted); pointer-events: none; }
    /* Bare <input> is themed by the shared kit; only layout overrides remain (icon padding + width). */
    .search-input { padding-left: 28px; width: 180px; }

    /* ── Active model banner ── */
    .active-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--accent-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 32px;
    }
    .active-banner.hidden { display: none; }
    .active-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      box-shadow: 0 0 0 2px var(--green-bg);
    }
    .active-label { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .active-name {
      font-size: 12px; font-weight: 600; color: var(--accent);
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .active-clear {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 2px 4px; border-radius: 3px;
      font-size: 11px; font-family: inherit; flex-shrink: 0;
    }
    .active-clear:hover { color: var(--text); background: var(--surface2); }

    /* ── Tabs ── */
    .tabs {
      display: flex; align-items: center; gap: 2px;
      padding: 6px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .tab {
      padding: 4px 12px; border-radius: 5px; border: none;
      cursor: pointer; font-size: 12px; font-weight: 500;
      font-family: inherit; background: transparent; color: var(--muted);
      transition: all 0.1s;
    }
    .tab.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
    .tab:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .tab-count {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--surface2); border-radius: 8px;
      font-size: 10px; padding: 1px 5px; margin-left: 4px; min-width: 16px;
    }
    .tab.active .tab-count { background: var(--accent-bg); }

    /* ── Content ── */
    .content {
      flex: 1; overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Section label ── */
    .section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); padding: 4px 2px 2px;
    }
    .section-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ── Model card (base styling from .ct-card; only deltas below) ── */
    .model-card { transition: border-color 0.15s; }
    .model-card:hover { border-color: var(--ct-border-2, var(--border)); }
    .model-card.is-active { border-color: color-mix(in srgb, var(--accent) 34%, transparent); background: var(--accent-bg); }
    .model-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .model-name { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge {
      display: inline-flex; align-items: center; border-radius: 4px;
      font-size: 10px; font-weight: 600; padding: 2px 6px; flex-shrink: 0;
    }
    .badge-size { background: var(--blue-bg); color: var(--blue); }
    .badge-format { background: var(--surface2); color: var(--muted); }
    .badge-active { background: var(--green-bg); color: var(--green); }
    .model-row2 { display: flex; align-items: center; gap: 6px; }
    .model-meta { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); flex: 1; }
    .model-hf {
      font-size: 11px; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px;
    }
    /* Base <button> is themed by the shared kit; only the small "active" accent state + sizing remain custom. */
    .use-btn { font-size: 11px; padding: 4px 10px; flex-shrink: 0; }
    .use-btn:hover:not(:disabled) { background: var(--accent-bg); border-color: color-mix(in srgb, var(--accent) 34%, transparent); color: var(--accent); }
    .use-btn.is-active { background: var(--accent-bg); border-color: color-mix(in srgb, var(--accent) 34%, transparent); color: var(--accent); cursor: default; }

    /* ── Running tab (card base from .ct-card; only internal layout below) ── */
    .info-block {
      display: flex; flex-direction: column; gap: 10px;
    }
    .info-block h3 { font-size: 13px; font-weight: 600; }
    .info-block p { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .endpoint-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px;
    }
    .ep-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .ep-dot.checking { background: var(--amber); animation: pulse 1.5s ease-in-out infinite; }
    .ep-dot.online { background: var(--green); }
    .ep-dot.offline { background: var(--border); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .ep-name { font-size: 12px; font-weight: 500; flex: 1; }
    .ep-url { font-size: 11px; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; }
    .ep-status { font-size: 10px; padding: 2px 6px; border-radius: 3px; }
    .ep-status.online { color: var(--green); background: var(--green-bg); }
    .ep-status.offline { color: var(--muted); background: var(--surface2); }
    .ep-status.checking { color: var(--amber); background: var(--amber-bg); }

    /* ── Running model card (base from .ct-card; only internal layout below) ── */
    .running-card {
      display: flex; align-items: center; gap: 10px;
    }
    .running-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    .running-info { flex: 1; min-width: 0; }
    .running-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .running-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .icon-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 4px; border-radius: 3px; display: flex; align-items: center;
    }
    .icon-btn:hover { color: var(--text); background: var(--surface2); }

    /* ── Add form (base from .ct-card; only internal layout below) ── */
    .add-form {
      display: flex; flex-direction: column; gap: 8px;
    }
    .add-form h4 { font-size: 12px; font-weight: 600; }
    .form-row { display: flex; gap: 6px; }
    /* Bare <input> is themed by the shared kit; only flex layout override remains. */
    .form-input { flex: 1; }
    /* "Models Dir" field spans the full daemon-config grid row. */
    .ct-field.full { grid-column: 1 / -1; }

    /* ── Footer ── */
    .footer {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; border-top: 1px solid var(--border);
      flex-shrink: 0; min-height: 30px;
    }
    .footer.hidden { display: none; }
    .footer-icon { color: var(--amber); flex-shrink: 0; }
    .footer-text { font-size: 11px; color: var(--muted); }
    .footer-text b { color: var(--amber); }

    /* ── Empty / no-results (base from .ct-empty; only icon dimming + text size below) ── */
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 12px; }
    .no-results { padding: 24px; text-align: center; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <svg class="toolbar-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="3" width="20" height="14" rx="2"/>
    <path d="M8 21h8M12 17v4M9 8l2 2 4-4"/>
  </svg>
  <span class="toolbar-title">Local Models</span>
  <div class="spacer"></div>
  <div class="search-wrap">
    <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" id="search-input" type="text" placeholder="Filter models..." />
  </div>
</div>

<!-- Active model banner -->
<div class="active-banner hidden" id="active-banner">
  <div class="active-dot"></div>
  <span class="active-label">Active:</span>
  <span class="active-name" id="active-name"></span>
  <button class="active-clear" id="active-clear">Clear</button>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" id="tab-popular">
    Popular
    <span class="tab-count" id="popular-count">0</span>
  </button>
  <button class="tab" id="tab-running">
    Running
    <span class="tab-count" id="running-count">0</span>
  </button>
</div>

<!-- Content -->
<div class="content" id="content"></div>

<!-- Footer -->
<div class="footer hidden" id="footer">
  <svg class="footer-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
  </svg>
  <span class="footer-text" id="footer-text"></span>
</div>

<script>
// ── Bridge RPC ────────────────────────────────────────────────────────────────

const pending = {}
let seq = 0
let TILE_ID = null
let bridgeReady = false

function rpc(method, params) {
  return new Promise((resolve, reject) => {
    const id = ++seq
    pending[id] = { resolve, reject }
    window.parent.postMessage(
      { type: 'contex-rpc', id, tileId: TILE_ID, method, params: params ?? null },
      '*'
    )
  })
}

window.addEventListener('message', function(e) {
  const msg = e.data
  if (!msg) return
  if (msg.type === 'contex-bridge-ready') { bridgeReady = true; init(); return }
  if (msg.type === 'contex-rpc-response') {
    const cb = pending[msg.id]
    if (!cb) return
    delete pending[msg.id]
    if (msg.error) cb.reject(new Error(msg.error))
    else cb.resolve(msg.result)
    return
  }
  if (msg.type === 'contex-action-invoke') { handleActionMsg(msg); return }
})

if (window.contex) { bridgeReady = true; init() }

function extInvoke(method) {
  var args = Array.prototype.slice.call(arguments, 1)
  return rpc('ext.invoke', { method: method, args: args })
}

async function refreshDaemonStatus() {
  try {
    daemonStatus = await extInvoke('getStatus')
  } catch (error) {
    daemonStatus = {
      running: false,
      healthy: false,
      host: null,
      port: null,
      pid: null,
      selectedModel: null,
      lastError: error && error.message ? error.message : String(error),
      config: daemonConfig,
    }
  }
  if (daemonStatus && daemonStatus.config) {
    daemonConfig = daemonStatus.config
  }
  if (currentTab === 'running') renderContent()
  return daemonStatus
}

async function refreshDaemonConfig() {
  try {
    daemonConfig = await extInvoke('getConfig')
  } catch (_) {
    try {
      daemonConfig = await rpc('settings.get', {})
    } catch {
      daemonConfig = null
    }
  }
  if (currentTab === 'running') renderContent()
  return daemonConfig
}

async function persistDaemonConfig(nextConfig) {
  daemonConfig = nextConfig
  try { await rpc('settings.set', nextConfig) } catch (_) {}
  try { await extInvoke('setConfig', nextConfig) } catch (_) {}
  if (currentTab === 'running') renderContent()
  return daemonConfig
}

// ── Model catalog ─────────────────────────────────────────────────────────────

const MODELS = [
  // SmolLM2
  { id: 'HuggingFaceTB/SmolLM2-135M-Instruct-GGUF',     name: 'SmolLM2 135M',    author: 'HuggingFace', size: '135M', group: 'tiny',   ramGB: 0.3 },
  { id: 'HuggingFaceTB/SmolLM2-360M-Instruct-GGUF',     name: 'SmolLM2 360M',    author: 'HuggingFace', size: '360M', group: 'tiny',   ramGB: 0.5 },
  { id: 'HuggingFaceTB/SmolLM2-1.7B-Instruct-GGUF',     name: 'SmolLM2 1.7B',    author: 'HuggingFace', size: '1.7B', group: 'small',  ramGB: 1.5 },
  // DeepSeek-R1
  { id: 'bartowski/DeepSeek-R1-Distill-Qwen-1.5B-GGUF', name: 'DeepSeek-R1 1.5B', author: 'DeepSeek',   size: '1.5B', group: 'small',  ramGB: 1.5 },
  { id: 'bartowski/DeepSeek-R1-Distill-Qwen-7B-GGUF',   name: 'DeepSeek-R1 7B',   author: 'DeepSeek',   size: '7B',   group: 'medium', ramGB: 6   },
  // Llama 3.2
  { id: 'bartowski/Llama-3.2-1B-Instruct-GGUF',         name: 'Llama 3.2 1B',    author: 'Meta',        size: '1B',   group: 'small',  ramGB: 1   },
  { id: 'bartowski/Llama-3.2-3B-Instruct-GGUF',         name: 'Llama 3.2 3B',    author: 'Meta',        size: '3B',   group: 'small',  ramGB: 2.5 },
  // Llama 3.1
  { id: 'bartowski/Meta-Llama-3.1-8B-Instruct-GGUF',    name: 'Llama 3.1 8B',    author: 'Meta',        size: '8B',   group: 'medium', ramGB: 6   },
  { id: 'bartowski/Meta-Llama-3.1-70B-Instruct-GGUF',   name: 'Llama 3.1 70B',   author: 'Meta',        size: '70B',  group: 'large',  ramGB: 40  },
  // Qwen2.5
  { id: 'Qwen/Qwen2.5-0.5B-Instruct-GGUF',              name: 'Qwen2.5 0.5B',    author: 'Alibaba',     size: '0.5B', group: 'tiny',   ramGB: 0.5 },
  { id: 'Qwen/Qwen2.5-1.5B-Instruct-GGUF',              name: 'Qwen2.5 1.5B',    author: 'Alibaba',     size: '1.5B', group: 'small',  ramGB: 1.5 },
  { id: 'Qwen/Qwen2.5-3B-Instruct-GGUF',                name: 'Qwen2.5 3B',      author: 'Alibaba',     size: '3B',   group: 'small',  ramGB: 2.5 },
  { id: 'Qwen/Qwen2.5-7B-Instruct-GGUF',                name: 'Qwen2.5 7B',      author: 'Alibaba',     size: '7B',   group: 'medium', ramGB: 6   },
  { id: 'Qwen/Qwen2.5-14B-Instruct-GGUF',               name: 'Qwen2.5 14B',     author: 'Alibaba',     size: '14B',  group: 'medium', ramGB: 10  },
  // Gemma 3
  { id: 'bartowski/gemma-3-1b-it-GGUF',                 name: 'Gemma 3 1B',      author: 'Google',      size: '1B',   group: 'small',  ramGB: 1   },
  { id: 'bartowski/gemma-3-4b-it-GGUF',                 name: 'Gemma 3 4B',      author: 'Google',      size: '4B',   group: 'small',  ramGB: 3.5 },
  { id: 'bartowski/gemma-3-12b-it-GGUF',                name: 'Gemma 3 12B',     author: 'Google',      size: '12B',  group: 'medium', ramGB: 9   },
  { id: 'bartowski/gemma-3-27b-it-GGUF',                name: 'Gemma 3 27B',     author: 'Google',      size: '27B',  group: 'large',  ramGB: 18  },
  // Phi-4
  { id: 'bartowski/phi-4-GGUF',                         name: 'Phi-4 14B',       author: 'Microsoft',   size: '14B',  group: 'medium', ramGB: 10  },
  // Mistral
  { id: 'bartowski/Mistral-7B-Instruct-v0.3-GGUF',     name: 'Mistral 7B',      author: 'Mistral AI',  size: '7B',   group: 'medium', ramGB: 6   },
]

const GROUP_ORDER  = ['tiny', 'small', 'medium', 'large']
const GROUP_LABELS = {
  tiny:   'Tiny (under 2B)',
  small:  'Small (1B \u2013 4B)',
  medium: 'Mid-size (7B \u2013 14B)',
  large:  'Large (27B+)',
}

// ── State ─────────────────────────────────────────────────────────────────────

let currentTab   = 'popular'
let activeModel  = null      // { modelId, name, size }
let searchQuery  = ''
let runningModels = []       // [{ id, name, endpoint }]
let tileMeta = null
let daemonStatus = null
let daemonConfig = null
let daemonStatusTimer = null

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  try {
    tileMeta = await rpc('tile.getMeta')
    TILE_ID = tileMeta && tileMeta.tileId ? tileMeta.tileId : null
  } catch (_) {}

  try {
    await rpc('actions.register', { name: 'setModel', description: 'Set the active model. Params: { modelId, name, size }' })
  } catch (_) {}

  try {
    const saved = await rpc('context.get', { key: 'ctx:models:active-model' })
    if (saved && saved.modelId) {
      activeModel = saved
      updateActiveBanner()
    }
  } catch (_) {}

  await refreshDaemonConfig()
  await refreshDaemonStatus()
  if (daemonStatusTimer) clearInterval(daemonStatusTimer)
  daemonStatusTimer = setInterval(function() {
    refreshDaemonStatus().catch(function() {})
  }, 5000)
  window.addEventListener('beforeunload', function() {
    if (daemonStatusTimer) clearInterval(daemonStatusTimer)
  }, { once: true })

  hydrateFromPeers()

  document.getElementById('search-input').addEventListener('input', function(e) {
    searchQuery = e.target.value.toLowerCase().trim()
    renderContent()
  })

  document.getElementById('active-clear').addEventListener('click', clearActiveModel)

  document.getElementById('tab-popular').addEventListener('click', function() { switchTab('popular') })
  document.getElementById('tab-running').addEventListener('click', function() { switchTab('running') })

  if (window.contex && window.contex.context && window.contex.context.onPeerContextChanged) {
    window.contex.context.onPeerContextChanged(function(data) {
      if (!data || !data.key) return
      if (data.key === 'ctx:model-hub:selected' && data.value && data.value.modelId) {
        applyInboundModel(data.value)
      }
      if (data.key === 'ctx:model-hub:inference-models' && Array.isArray(data.value) && data.value[0] && data.value[0].modelId) {
        applyInboundModel(data.value[0])
      }
    })
  }

  renderContent()
}

// ── Action handler ─────────────────────────────────────────────────────────────

function handleActionMsg(msg) {
  if (msg.action === 'setModel' && msg.params && msg.params.modelId) {
    setActiveModel({ modelId: msg.params.modelId, name: msg.params.name || msg.params.modelId, size: msg.params.size || '' })
  }
  window.parent.postMessage(
    { type: 'contex-action-result', tileId: TILE_ID, requestId: msg.requestId, result: 'ok' },
    '*'
  )
}

// ── Active model ──────────────────────────────────────────────────────────────

async function setActiveModel(model) {
  activeModel = model
  try { await rpc('context.set', { key: 'ctx:models:active-model', value: model }) } catch (_) {}
  try { await rpc('context.set', { key: 'ctx:models:inference-models', value: model ? [model] : [] }) } catch (_) {}
  try { await rpc('tile.setState', { key: 'active-model', value: model }) } catch (_) {}
  try { await extInvoke('setSelectedModel', model) } catch (_) {}
  updateActiveBanner()
  renderContent()
}

async function clearActiveModel() {
  activeModel = null
  try { await rpc('context.set', { key: 'ctx:models:active-model', value: null }) } catch (_) {}
  try { await rpc('context.set', { key: 'ctx:models:inference-models', value: [] }) } catch (_) {}
  try { await rpc('tile.setState', { key: 'active-model', value: null }) } catch (_) {}
  try { await extInvoke('setSelectedModel', null) } catch (_) {}
  updateActiveBanner()
  renderContent()
}

function normalizeIncomingModel(value) {
  if (!value || typeof value !== 'object') return null
  var modelId = typeof value.modelId === 'string' ? value.modelId.trim() : ''
  if (!modelId && typeof value.id === 'string') modelId = value.id.trim()
  if (!modelId) return null
  return {
    modelId: modelId,
    name: typeof value.name === 'string' && value.name.trim() ? value.name.trim() : modelId,
    size: typeof value.size === 'string' ? value.size : '',
  }
}

function sameModel(a, b) {
  if (!a && !b) return true
  if (!a || !b) return false
  return a.modelId === b.modelId && a.name === b.name && a.size === b.size
}

function applyInboundModel(value) {
  var next = normalizeIncomingModel(value)
  if (!next || sameModel(activeModel, next)) return
  void setActiveModel(next)
}

function hydrateFromPeers() {
  if (!window.contex || !window.contex.context || !window.contex.context.getAllPeerContext) return
  window.contex.context.getAllPeerContext('ctx:model-hub:').then(function(map) {
    if (!map) return
    var inferred = null
    Object.keys(map).forEach(function(peerId) {
      var entries = map[peerId] || []
      if (!Array.isArray(entries)) return
      entries.forEach(function(entry) {
        if (!entry || !entry.key) return
        if (entry.key === 'ctx:model-hub:selected') {
          var selected = normalizeIncomingModel(entry.value)
          if (selected) inferred = selected
        }
        if (entry.key === 'ctx:model-hub:inference-models' && Array.isArray(entry.value) && entry.value[0] && entry.value[0].modelId) {
          var first = normalizeIncomingModel(entry.value[0])
          if (first) inferred = first
        }
      })
    })
    if (inferred && !sameModel(activeModel, inferred)) void setActiveModel(inferred)
  }).catch(function() {})
}

function updateActiveBanner() {
  var banner  = document.getElementById('active-banner')
  var nameEl  = document.getElementById('active-name')
  var footer  = document.getElementById('footer')
  var footerT = document.getElementById('footer-text')

  if (!activeModel) {
    banner.classList.add('hidden')
    footer.classList.add('hidden')
    return
  }

  banner.classList.remove('hidden')
  nameEl.textContent = activeModel.name + (activeModel.size ? ' (' + activeModel.size + ')' : '')

  var m = findModelById(activeModel.modelId)
  if (m) {
    footer.classList.remove('hidden')
    var ramStr = m.ramGB >= 1 ? m.ramGB + ' GB' : Math.round(m.ramGB * 1024) + ' MB'
    footerT.textContent = 'RAM estimate for ' + m.name + ': ~' + ramStr
  } else {
    footer.classList.add('hidden')
  }
}

function findModelById(id) {
  for (var i = 0; i < MODELS.length; i++) {
    if (MODELS[i].id === id) return MODELS[i]
  }
  return null
}

// ── Tabs ──────────────────────────────────────────────────────────────────────

function switchTab(tab) {
  currentTab = tab
  document.getElementById('tab-popular').classList.toggle('active', tab === 'popular')
  document.getElementById('tab-running').classList.toggle('active', tab === 'running')
  renderContent()
}

// ── Filtering ─────────────────────────────────────────────────────────────────

function getFilteredModels() {
  return MODELS.filter(function(m) {
    return m.name.toLowerCase().indexOf(searchQuery) !== -1 ||
           m.author.toLowerCase().indexOf(searchQuery) !== -1 ||
           m.size.toLowerCase().indexOf(searchQuery) !== -1 ||
           m.id.toLowerCase().indexOf(searchQuery) !== -1
  })
}

function getExternalActiveModelCard() {
  if (!activeModel || findModelById(activeModel.modelId)) return null
  var modelId = activeModel.modelId
  var author = modelId.indexOf('/') !== -1 ? modelId.split('/')[0] : 'Extension'
  return {
    id: modelId,
    name: activeModel.name || modelId,
    author: author,
    size: activeModel.size || 'Selected',
    sourceTag: 'Hub',
  }
}

function matchesExternalModelSearch(model) {
  if (!searchQuery) return true
  return model.name.toLowerCase().indexOf(searchQuery) !== -1 ||
         model.author.toLowerCase().indexOf(searchQuery) !== -1 ||
         model.size.toLowerCase().indexOf(searchQuery) !== -1 ||
         model.id.toLowerCase().indexOf(searchQuery) !== -1
}

function ramLabel(ramGB) {
  return ramGB < 1 ? Math.round(ramGB * 1024) + ' MB RAM' : ramGB + ' GB RAM'
}

// ── Rendering ─────────────────────────────────────────────────────────────────

function renderContent() {
  updateTabCounts()
  var container = document.getElementById('content')
  container.textContent = ''
  if (currentTab === 'popular') renderPopular(container)
  else renderRunning(container)
}

function updateTabCounts() {
  var external = getExternalActiveModelCard()
  var popularCount = getFilteredModels().length + (external && matchesExternalModelSearch(external) ? 1 : 0)
  document.getElementById('popular-count').textContent = popularCount
  document.getElementById('running-count').textContent = runningModels.length
}

// ── Popular tab ───────────────────────────────────────────────────────────────

function renderPopular(container) {
  var filtered = getFilteredModels()
  var external = getExternalActiveModelCard()
  var showExternal = !!(external && matchesExternalModelSearch(external))

  if (!showExternal && filtered.length === 0) {
    var noRes = document.createElement('div')
    noRes.className = 'no-results'
    noRes.textContent = 'No models match "' + searchQuery + '"'
    container.appendChild(noRes)
    return
  }

  if (showExternal && external) {
    var selectedLabel = document.createElement('div')
    selectedLabel.className = 'section-label'
    selectedLabel.textContent = 'Selected From Chain'
    container.appendChild(selectedLabel)
    container.appendChild(buildModelCard(external))

    if (filtered.length > 0) {
      var selectedDivider = document.createElement('div')
      selectedDivider.className = 'section-divider'
      container.appendChild(selectedDivider)
    }
  }

  var groups = {}
  filtered.forEach(function(m) {
    if (!groups[m.group]) groups[m.group] = []
    groups[m.group].push(m)
  })

  GROUP_ORDER.forEach(function(key) {
    if (!groups[key] || groups[key].length === 0) return

    var label = document.createElement('div')
    label.className = 'section-label'
    label.textContent = GROUP_LABELS[key]
    container.appendChild(label)

    groups[key].forEach(function(m) {
      container.appendChild(buildModelCard(m))
    })

    var divider = document.createElement('div')
    divider.className = 'section-divider'
    container.appendChild(divider)
  })
}

  ramIcon.appendChild(rect)
  ;['M6 8V6','M10 8V6','M14 8V6','M18 8V6','M6 16v2','M10 16v2','M14 16v2','M18 16v2'].forEach(function(d) {

function getDaemonConfigDraft() {
  return Object.assign({
    command: 'ollama',
    args: 'serve',
    basePort: 11435,
    healthPath: '/api/tags',
    modelsDir: '',
  }, daemonConfig || {})
}

function buildManagedDaemonBlock() {
  var config = getDaemonConfigDraft()

  var p = document.createElement('p')

  block.appendChild(p)

  var statusRow = document.createElement('div')
  statusRow.className = 'endpoint-row'

  var dot = document.createElement('div')
  dot.className = 'ep-dot ' + (daemonStatus && daemonStatus.healthy ? 'online' : daemonStatus && daemonStatus.running ? 'checking' : 'offline')
  statusRow.appendChild(dot)

  var name = document.createElement('span')
  name.className = 'ep-name'
  name.textContent = daemonStatus && daemonStatus.running
    ? (daemonStatus.healthy ? 'Running' : 'Starting')

  statusRow.appendChild(name)

  var urlEl = document.createElement('span')
  urlEl.className = 'ep-url'
  urlEl.textContent = daemonStatus && daemonStatus.host ? daemonStatus.host : 'No managed host'
  statusRow.appendChild(urlEl)

  var status = document.createElement('span')
  status.className = 'ep-status ' + (daemonStatus && daemonStatus.healthy ? 'online' : daemonStatus && daemonStatus.running ? 'checking' : 'offline')
  status.textContent = daemonStatus && daemonStatus.healthy ? 'Healthy' : daemonStatus && daemonStatus.running ? 'Starting' : 'Offline'
  statusRow.appendChild(status)

  block.appendChild(statusRow)

  if (daemonStatus && daemonStatus.pid) {
    var pidMeta = document.createElement('div')
    pidMeta.className = 'ct-field-hint'
    pidMeta.textContent = 'PID ' + daemonStatus.pid + (daemonStatus.workspacePath ? ' • cwd ' + daemonStatus.workspacePath : '')
    block.appendChild(pidMeta)
  }

  if (daemonStatus && daemonStatus.lastError) {
    var errorEl = document.createElement('div')
    errorEl.className = 'ct-field-hint ct-warning'
    errorEl.textContent = daemonStatus.lastError
    block.appendChild(errorEl)
  }

  var grid = document.createElement('div')
  grid.className = 'ct-grid'

  function buildField(labelText, input) {
    var field = document.createElement('div')
    field.className = 'ct-field' + (labelText === 'Models Dir' ? ' full' : '')

    label.className = 'ct-field-label'

  }

  var commandInput = document.createElement('input')

  var argsInput = document.createElement('input')

  argsInput.placeholder = 'serve'

  var portInput = document.createElement('input')
  portInput.className = 'form-input'
  portInput.type = 'number'
  portInput.value = String(config.basePort || 11435)
  grid.appendChild(buildField('Base Port', portInput))

  var healthInput = document.createElement('input')
  healthInput.className = 'form-input'
  healthInput.value = config.healthPath || '/api/tags'
  healthInput.placeholder = '/api/tags'
  grid.appendChild(buildField('Health Path', healthInput))

  var modelsInput = document.createElement('input')
  modelsInput.className = 'form-input'
  modelsInput.value = config.modelsDir || ''
  modelsInput.placeholder = '/path/to/models (optional)'
  grid.appendChild(buildField('Models Dir', modelsInput))

  block.appendChild(grid)

  var controls = document.createElement('div')
  controls.className = 'ct-row'

  var saveBtn = document.createElement('button')
  saveBtn.className = 'primary'
  saveBtn.textContent = 'Save Config'
  saveBtn.addEventListener('click', async function() {
    await persistDaemonConfig({
      command: commandInput.value.trim(),
      args: argsInput.value.trim(),
      basePort: Number(portInput.value || 11435),
      healthPath: healthInput.value.trim(),
      modelsDir: modelsInput.value.trim(),
    })
    await refreshDaemonStatus()
  })
  controls.appendChild(saveBtn)

  var startBtn = document.createElement('button')
  startBtn.className = 'primary'
  startBtn.textContent = daemonStatus && daemonStatus.running ? 'Restart' : 'Start'
  startBtn.addEventListener('click', async function() {
    await persistDaemonConfig({
      command: commandInput.value.trim(),
      args: argsInput.value.trim(),
      basePort: Number(portInput.value || 11435),
      healthPath: healthInput.value.trim(),
      modelsDir: modelsInput.value.trim(),
    })
    await extInvoke('startDaemon', { workspacePath: tileMeta && tileMeta.workspacePath ? tileMeta.workspacePath : '' })
    await refreshDaemonStatus()
  })
  controls.appendChild(startBtn)

  var stopBtn = document.createElement('button')
  stopBtn.className = 'use-btn'
  stopBtn.textContent = 'Stop'
  stopBtn.disabled = !(daemonStatus && daemonStatus.running)
  stopBtn.addEventListener('click', async function() {
    await extInvoke('stopDaemon')
    await refreshDaemonStatus()
  })
  controls.appendChild(stopBtn)

  var refreshBtn = document.createElement('button')
  refreshBtn.className = 'use-btn'
  refreshBtn.textContent = 'Refresh'
  refreshBtn.addEventListener('click', async function() {
    await refreshDaemonConfig()
    await refreshDaemonStatus()
  })
  controls.appendChild(refreshBtn)

  block.appendChild(controls)
  return block
}

// ── Running tab ───────────────────────────────────────────────────────────────

  container.appendChild(buildManagedDaemonBlock())
  container.appendChild(buildEndpointsBlock())

  // Running models list
  if (runningModels.length > 0) {
    var label = document.createElement('div')
    label.className = 'section-label'
    label.textContent = 'Running Models'
    container.appendChild(label)

    runningModels.forEach(function(rm) {
      container.appendChild(buildRunningCard(rm))
    })
  } else {
    var empty = document.createElement('div')
    empty.className = 'ct-empty empty-state'

    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg')
    svg.setAttribute('width', '32'); svg.setAttribute('height', '32')
    svg.setAttribute('viewBox', '0 0 24 24')
    svg.setAttribute('fill', 'none'); svg.setAttribute('stroke', 'currentColor')
    svg.setAttribute('stroke-width', '1.5')
    svg.setAttribute('stroke-linecap', 'round'); svg.setAttribute('stroke-linejoin', 'round')
    var svgRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect')
    svgRect.setAttribute('x', '2'); svgRect.setAttribute('y', '3')
    svgRect.setAttribute('width', '20'); svgRect.setAttribute('height', '14'); svgRect.setAttribute('rx', '2')
    svg.appendChild(svgRect)
    ;['M8 21h8', 'M12 17v4'].forEach(function(d) {
      var p = document.createElementNS('http://www.w3.org/2000/svg', 'path')
      p.setAttribute('d', d); svg.appendChild(p)
    })
    empty.appendChild(svg)

    var p = document.createElement('p')
    p.textContent = 'No running models added yet. Start a server and add it below.'
    empty.appendChild(p)
    container.appendChild(empty)
  }

  // Add form
  container.appendChild(buildAddForm())

  // Kick off endpoint probing
  checkEndpoint('ollama', 'http://localhost:11434')

  checkEndpoint('lmstudio', 'http://localhost:1234')
}

  useBtn.disabled = !!isActive
  if (!isActive) {

    })
  }

  var removeBtn = document.createElement('button')
  removeBtn.className = 'icon-btn'
  removeBtn.title = 'Remove'
  var xSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg')
  xSvg.setAttribute('width', '12'); xSvg.setAttribute('height', '12')
  xSvg.setAttribute('viewBox', '0 0 24 24'); xSvg.setAttribute('fill', 'none')
  xSvg.setAttribute('stroke', 'currentColor'); xSvg.setAttribute('stroke-width', '2')
  xSvg.setAttribute('stroke-linecap', 'round')
  ;[['M18 6 6 18'], ['M6 6l12 12']].forEach(function(pair) {
    var line = document.createElementNS('http://www.w3.org/2000/svg', 'line')
    // Use path instead for simplicity
    var p = document.createElementNS('http://www.w3.org/2000/svg', 'path')
    p.setAttribute('d', pair[0])

function buildAddForm() {
  var form = document.createElement('div')
  form.className = 'ct-card add-form'

  var h4 = document.createElement('h4')
  h4.textContent = 'Add Running Model'
  form.appendChild(h4)

  var row = document.createElement('div')
  row.className = 'form-row'

  var nameInput = document.createElement('input')
  nameInput.className = 'form-input'
  nameInput.type = 'text'
  nameInput.placeholder = 'Model name (e.g. llama3.2)'
  nameInput.id = 'add-model-name'
  row.appendChild(nameInput)

  var epInput = document.createElement('input')
  epInput.className = 'form-input'
  epInput.type = 'text'
  epInput.placeholder = 'Endpoint (e.g. localhost:11434)'
  epInput.style.maxWidth = '180px'
  epInput.id = 'add-model-endpoint'
  row.appendChild(epInput)

  var addBtn = document.createElement('button')
  addBtn.className = 'primary'
  addBtn.textContent = 'Add'
  row.appendChild(addBtn)

  form.appendChild(row)

  function doAdd() {
    var name     = nameInput.value.trim()
    var endpoint = epInput.value.trim() || 'localhost:11434'
    if (!name) { nameInput.focus(); return }
    var id = 'running:' + endpoint + ':' + name
    if (runningModels.some(function(x) { return x.id === id })) {
      nameInput.value = ''
      return
    }
    runningModels.push({ id: id, name: name, endpoint: endpoint })
    nameInput.value = ''
    epInput.value = ''
    renderContent()
  }

  addBtn.addEventListener('click', doAdd)
  nameInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doAdd() })
  epInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doAdd() })

  return form
}

// ── Endpoint probing ──────────────────────────────────────────────────────────

function checkEndpoint(key, url) {
  var dot    = document.getElementById('ep-dot-' + key)
  var status = document.getElementById('ep-status-' + key)
  if (!dot || !status) return

  var controller = new AbortController()
  var timer = setTimeout(function() { controller.abort() }, 2500)

  fetch(url, { signal: controller.signal, mode: 'no-cors' })
    .then(function() {
      clearTimeout(timer)
      // opaque response (status 0) still means server responded
      dot.className = 'ep-dot online'
      status.className = 'ep-status online'
      status.textContent = 'Online'
    })
    .catch(function() {
      dot.className = 'ep-dot offline'
      status.className = 'ep-status offline'
      status.textContent = 'Offline'
    })
}
