<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    background: transparent;
  }

  body {
    font-family: var(--ct-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
    color: var(--ct-text, #111);
    overflow: hidden;
  }

  .app {
    width: 100%;
    height: 100%;
    padding: 10px;
  }

  .surface {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px;
    border-radius: 16px;
    background: var(--ct-panel, rgba(0,0,0,.04));
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    overflow: hidden;
  }

  .surface-header {
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 28px;
    flex-shrink: 0;
  }

  .surface-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--ct-accent-s, rgba(79,70,229,.12));
    color: var(--ct-accent, #4f46e5);
    border: 1px solid color-mix(in srgb, var(--ct-accent, #4f46e5) 18%, transparent);
    font-size: 14px;
    flex-shrink: 0;
  }

  .surface-copy {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .surface-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ct-text, #111);
  }

  .surface-subtitle {
    font-size: 11px;
    line-height: 1.35;
    color: var(--ct-dim, #999);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .variant-region {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow: hidden;
  }

  .variant-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    min-height: 24px;
    flex-shrink: 0;
  }

  .variant-head-actions {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    flex-shrink: 0;
  }

  .history-select {
    max-width: 190px;
    height: 26px;
    padding: 0 8px;
    border-radius: 999px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    color: var(--ct-text, #111);
    font: inherit;
    font-size: 11px;
    outline: none;
  }

  .history-select:disabled {
    opacity: 0.55;
  }

  .variant-head-copy {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .variant-head-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--ct-text, #111);
  }

  .variant-head-subtitle {
    font-size: 11px;
    color: var(--ct-dim, #999);
    line-height: 1.35;
  }

  .variant-grid-wrap {
    flex: 1;
    min-height: 0;
    overflow: auto;
  }

  .variant-grid {
    display: grid;
    gap: 10px;
    min-height: 100%;
  }

  .variant-card {
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    cursor: pointer;
    transition: border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
  }

  .variant-card:hover {
    border-color: var(--ct-border-2, rgba(0,0,0,.16));
    background: var(--ct-hover, rgba(0,0,0,.08));
  }

  .variant-card.active {
    border-color: color-mix(in srgb, var(--ct-accent, #4f46e5) 28%, transparent);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--ct-accent, #4f46e5) 14%, transparent);
  }

  .variant-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .variant-title {
    min-width: 0;
    font-size: 12px;
    font-weight: 700;
    color: var(--ct-text, #111);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .variant-actions {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .control-btn,
  .segment-btn,
  .send-btn {
    appearance: none;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    color: var(--ct-text, #111);
    font-family: inherit;
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease, color 120ms ease, box-shadow 120ms ease;
  }

  .control-btn:hover,
  .segment-btn:hover,
  .send-btn:hover {
    background: var(--ct-hover, rgba(0,0,0,.08));
    border-color: var(--ct-border-2, rgba(0,0,0,.16));
  }

  .control-btn {
    height: 28px;
    padding: 0 9px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 11px;
    line-height: 1;
  }

  .control-btn.active {
    border-color: color-mix(in srgb, var(--ct-accent, #4f46e5) 24%, transparent);
    background: var(--ct-accent-s, rgba(79,70,229,.12));
    color: var(--ct-accent, #4f46e5);
  }

  .variant-preview {
    flex: 1;
    min-height: 160px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel, rgba(0,0,0,.04));
  }

  .variant-preview iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
  }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 180px;
    height: 100%;
    padding: 24px;
    border-radius: 12px;
    border: 1px dashed var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    color: var(--ct-dim, #999);
    text-align: center;
    line-height: 1.45;
  }

  .composer {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--ct-border, rgba(0,0,0,.1));
  }

  .wanted-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 0;
  }

  .wanted-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 999px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    font-size: 10px;
    color: var(--ct-text, #111);
  }

  .wanted-chip button {
    appearance: none;
    border: none;
    background: transparent;
    color: inherit;
    cursor: pointer;
    padding: 0;
    font-size: 11px;
    line-height: 1;
  }

  .composer-frame {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 16px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: transparent;
  }

  .composer-input {
    width: 100%;
    min-height: 42px;
    max-height: 120px;
    resize: none;
    border: none;
    background: transparent;
    color: var(--ct-text, #111);
    font: inherit;
    line-height: 1.45;
    outline: none;
    box-shadow: none;
    padding: 0;
    margin: 0;
    overflow-y: auto;
  }

  .composer-input:focus {
    outline: none;
    box-shadow: none;
  }

  .composer-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .segmented {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px;
    border-radius: 999px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    flex-shrink: 0;
  }

  .segment-btn {
    min-width: 30px;
    height: 24px;
    padding: 0 8px;
    border-radius: 999px;
    border-color: transparent;
    background: transparent;
    color: var(--ct-dim, #999);
    font-size: 10px;
    line-height: 1;
  }

  .segment-btn.active {
    background: var(--ct-accent-s, rgba(79,70,229,.12));
    border-color: color-mix(in srgb, var(--ct-accent, #4f46e5) 20%, transparent);
    color: var(--ct-accent, #4f46e5);
  }

  .composer-meta {
    min-width: 0;
    flex: 1;
    font-size: 11px;
    line-height: 1.35;
    color: var(--ct-dim, #999);
  }

  .send-btn {
    width: 30px;
    height: 30px;
    min-width: 30px;
    padding: 0;
    border-radius: 999px;
    border: none;
    background: var(--ct-accent, #4f46e5);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    line-height: 1;
    flex-shrink: 0;
  }

  .send-btn:disabled {
    opacity: 0.5;
    cursor: default;
  }

  .error {
    display: none;
    font-size: 11px;
    line-height: 1.45;
    color: var(--ct-danger, #dc2626);
  }

  .settings-overlay,
  .expand-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.36);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }

  .settings-panel,
  .expand-panel {
    width: min(520px, 100%);
    max-height: 100%;
    overflow: hidden;
  }

  .settings-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px;
  }

  .settings-actions,
  .expand-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 12px;
  }

  .expand-copy {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 12px 12px 0 12px;
  }

  .expand-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ct-text, #111);
  }

  .expand-subtitle {
    font-size: 11px;
    line-height: 1.35;
    color: var(--ct-dim, #999);
  }

  .expand-preview {
    height: min(72vh, 720px);
    padding: 12px;
  }

  .expand-preview-frame {
    width: 100%;
    height: 100%;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel, rgba(0,0,0,.04));
  }

  .expand-preview-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
  }

  html[data-render-mode="chat"] .app {
    padding: 8px;
  }

  html[data-render-mode="chat"] .surface {
    padding: 8px;
    gap: 6px;
    border-radius: 14px;
  }

  html[data-render-mode="chat"] .surface-header {
    display: none;
  }

  html[data-render-mode="chat"] .variant-head-subtitle {
    display: none;
  }

  html[data-render-mode="chat"] .history-select {
    max-width: 132px;
  }

  html[data-render-mode="chat"] .variant-preview {
    min-height: 132px;
  }

  html[data-render-mode="chat"] .composer {
    gap: 6px;
    padding-top: 6px;
  }

  html[data-render-mode="chat"] .composer-frame {
    padding: 8px 10px;
    border-radius: 14px;
  }

  html[data-render-mode="chat"] .composer-input {
    min-height: 38px;
    max-height: 88px;
  }

  html[data-render-mode="chat"] .composer-meta {
    display: none;
  }

  html[data-render-mode="chat"] .settings-label {
    display: none;
  }

  html[data-render-mode="canvas"] .variant-preview,
  html[data-render-mode="docked"] .variant-preview {
    min-height: 220px;
  }

  @media (max-width: 980px) {
    .variant-grid {
      grid-template-columns: 1fr !important;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="surface">
      <div class="surface-header">
        <div class="surface-icon">✦</div>
        <div class="surface-copy">
          <div class="surface-title">Builder</div>
          <div class="surface-subtitle">Generate variants, want references, and request changes from the bottom composer.</div>
        </div>
      </div>

      <div class="variant-region">
        <div class="variant-head">
          <div class="variant-head-copy">
            <div class="variant-head-title">Variants</div>
            <div class="variant-head-subtitle">Large previews side by side in the active light or dark theme.</div>
          </div>
          <div class="variant-head-actions">
            <select id="historySelect" class="history-select" title="Build history" aria-label="Build history"></select>
            <div id="variantCounter" class="ct-pill">0 variants</div>
          </div>
        </div>
        <div class="variant-grid-wrap">
          <div id="variantGrid" class="variant-grid"></div>
          <div id="emptyState" class="empty-state">Enter a prompt below, choose 1 / 2 / 3, and generate.</div>
        </div>
      </div>

      <div class="composer">
        <div id="wantedChips" class="wanted-chips"></div>
        <div class="composer-frame">
          <textarea id="prompt" class="composer-input" rows="2" placeholder="Describe the design you want, or request changes to wanted variants."></textarea>
          <div class="composer-row">
            <div id="variantCountControl" class="segmented">
              <button type="button" class="segment-btn" data-count="1">1</button>
              <button type="button" class="segment-btn" data-count="2">2</button>
              <button type="button" class="segment-btn" data-count="3">3</button>
            </div>
            <div id="peerContextSummary" class="composer-meta"></div>
            <button id="settingsBtn" type="button" class="control-btn" title="Settings">⚙ <span class="settings-label">Settings</span></button>
            <button id="generateBtn" type="button" class="send-btn" title="Generate variants" aria-label="Generate variants">↑</button>
          </div>
        </div>
        <div id="errorBox" class="error"></div>
      </div>
    </div>
  </div>

  <div id="settingsOverlay" class="settings-overlay">
    <div class="ct-card settings-panel">
      <div class="ct-toolbar" style="padding:12px 12px 0 12px;border-bottom:none;">
        <div class="ct-toolbar-title">⚙ Builder settings</div>
      </div>
      <div class="settings-body">
        <label>
          <div class="ct-toolbar-title" style="font-size:11px;margin-bottom:6px;">API Key</div>
          <input id="settApiKey" type="password" placeholder="sk-or-... or sk-...">
        </label>
        <label>
          <div class="ct-toolbar-title" style="font-size:11px;margin-bottom:6px;">Model</div>
          <input id="settModel" type="text" placeholder="anthropic/claude-sonnet-4">
        </label>
        <label>
          <div class="ct-toolbar-title" style="font-size:11px;margin-bottom:6px;">API Base URL</div>
          <input id="settBaseUrl" type="text" placeholder="https://openrouter.ai/api/v1">
        </label>
      </div>
      <div class="settings-actions">
        <button id="settingsCancelBtn" type="button">Cancel</button>
        <button id="settingsSaveBtn" type="button" class="primary">Save</button>
      </div>
    </div>
  </div>

  <div id="expandOverlay" class="expand-overlay">
    <div class="ct-card expand-panel">
      <div class="expand-copy">
        <div id="expandTitle" class="expand-title">Variant</div>
        <div id="expandSubtitle" class="expand-subtitle">Expanded preview</div>
      </div>
      <div class="expand-preview">
        <div class="expand-preview-frame">
          <iframe id="expandPreview" sandbox="allow-scripts allow-same-origin" title="Expanded variant preview"></iframe>
        </div>
      </div>
      <div class="expand-actions">
        <button id="expandCloseBtn" type="button">Close</button>
      </div>
    </div>
  </div>

<script>
  var DEFAULTS = { apiKey: '', model: 'anthropic/claude-sonnet-4', baseUrl: 'https://openrouter.ai/api/v1' };
  var STATE_VERSION = 1;
  var HISTORY_LIMIT = 30;
  var STATE_STORAGE_PREFIX = 'builder-state-v1:';
  var TILE_STATE_KEY = 'builderState';
  var persistTimer = null;
  var localStateKeyCache = null;
  var SYSTEM_PROMPT = 'You are an expert UI builder. Return ONLY valid HTML or a full HTML document. Never return markdown, code fences, or prose. Produce polished, product-facing UI with strong hierarchy, careful spacing, and restrained styling. Default to the host theme provided in the prompt unless the prompt explicitly asks for a different visual theme. IMPORTANT: match the requested scope. If the prompt asks for a component, control, tab bar, nav bar, card, panel, or other partial UI, output only that component at natural bounds. Do NOT wrap small UI in a full phone screen, browser window, device mockup, or giant empty application shell unless the prompt explicitly asks for that whole screen.';

  var state = {
    renderMode: deriveRenderMode(),
    config: loadConfig(),
    contexReady: false,
    variantCount: 3,
    variants: [],
    activeVariantId: null,
    wantedRefs: [],
    expandedVariantId: null,
    currentBuildId: null,
    history: [],
    loadingPersistedState: false,
    generating: false,
    abortCtrl: null,
    peerContext: {},
  };

  document.documentElement.setAttribute('data-render-mode', state.renderMode);

  function $(id) { return document.getElementById(id); }

  function deriveRenderMode() {
    try {
      var params = new URLSearchParams(window.location.search || '');
      var explicit = params.get('renderMode');
      if (explicit === 'chat' || explicit === 'canvas' || explicit === 'docked') return explicit;
      if (params.get('surfaceKind') === 'chat') return 'chat';
    } catch (err) {}
    return 'canvas';
  }

  function loadConfig() {
    try {
      var raw = localStorage.getItem('builder-config');
      return raw ? Object.assign({}, DEFAULTS, JSON.parse(raw)) : Object.assign({}, DEFAULTS);
    } catch (e) {
      return Object.assign({}, DEFAULTS);
    }
  }

  function saveConfig(config) {
    localStorage.setItem('builder-config', JSON.stringify(config));
  }

  function urlParam(name) {
    try {
      return new URLSearchParams(window.location.search || '').get(name) || '';
    } catch (err) {
      return '';
    }
  }

  function localStateKeys() {
    if (!localStateKeyCache) {
      var surfaceKind = urlParam('surfaceKind') || (urlParam('renderMode') === 'chat' ? 'chat' : '');
      var mode = surfaceKind === 'chat' ? 'chat' : 'tile';
      var id = urlParam('tileId') || urlParam('surfaceId') || (window.contex && window.contex.tileId) || 'default';
      localStateKeyCache = STATE_STORAGE_PREFIX + mode + ':' + id;
    }
    var keys = [localStateKeyCache];
    if (localStateKeyCache.indexOf(STATE_STORAGE_PREFIX + 'chat:') === 0) {
      keys.push(STATE_STORAGE_PREFIX + 'chat:latest');
    }
    return keys;
  }

  function loadLocalState() {
    var keys = localStateKeys();
    for (var i = 0; i < keys.length; i++) {
      try {
        var raw = localStorage.getItem(keys[i]);
        if (!raw) continue;
        var parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') return parsed;
      } catch (err) {}
    }
    return null;
  }

  function saveLocalState(snapshot) {
    var keys = localStateKeys();
    for (var i = 0; i < keys.length; i++) {
      try {
        localStorage.setItem(keys[i], JSON.stringify(snapshot));
      } catch (err) {}
    }
  }

  function cloneVariant(variant) {
    if (!variant || typeof variant !== 'object') return null;
    var html = typeof variant.html === 'string' ? variant.html : '';
    var prompt = typeof variant.prompt === 'string' ? variant.prompt : '';
    return {
      id: typeof variant.id === 'string' && variant.id ? variant.id : uid('variant'),
      label: typeof variant.label === 'string' && variant.label ? variant.label : 'Variant',
      prompt: prompt,
      html: html,
      status: variant.status === 'error' || variant.status === 'generating' ? variant.status : (html ? 'ready' : 'empty')
    };
  }

  function cloneWantedRef(snapshot) {
    if (!snapshot || typeof snapshot !== 'object') return null;
    return {
      sourceId: typeof snapshot.sourceId === 'string' ? snapshot.sourceId : '',
      label: typeof snapshot.label === 'string' && snapshot.label ? snapshot.label : 'Reference',
      html: typeof snapshot.html === 'string' ? snapshot.html : ''
    };
  }

  function sanitizeVariants(value) {
    if (!Array.isArray(value)) return [];
    return value.map(cloneVariant).filter(Boolean).slice(0, 3);
  }

  function sanitizeWantedRefs(value) {
    if (!Array.isArray(value)) return [];
    return value.map(cloneWantedRef).filter(function(item) { return item && item.html; }).slice(0, 12);
  }

  function currentPromptValue() {
    var input = $('prompt');
    return input ? input.value.trim() : '';
  }

  function historyTitle(prompt, createdAt) {
    var trimmed = String(prompt || '').trim();
    if (trimmed) return truncate(trimmed, 64);
    try { return 'Build ' + new Date(createdAt || Date.now()).toLocaleString(); } catch (err) { return 'Build'; }
  }

  function sanitizeHistory(value) {
    if (!Array.isArray(value)) return [];
    return value.map(function(item) {
      if (!item || typeof item !== 'object') return null;
      var variants = sanitizeVariants(item.variants);
      if (!variants.length) return null;
      var createdAt = Number(item.createdAt) || Date.now();
      var activeId = typeof item.activeVariantId === 'string' && variants.some(function(variant) { return variant.id === item.activeVariantId; })
        ? item.activeVariantId
        : variants[0].id;
      var prompt = typeof item.prompt === 'string' ? item.prompt : (variants[0] ? variants[0].prompt : '');
      return {
        id: typeof item.id === 'string' && item.id ? item.id : uid('build'),
        title: typeof item.title === 'string' && item.title ? item.title : historyTitle(prompt, createdAt),
        prompt: prompt,
        variants: variants,
        activeVariantId: activeId,
        wantedRefs: sanitizeWantedRefs(item.wantedRefs),
        createdAt: createdAt,
        updatedAt: Number(item.updatedAt) || createdAt
      };
    }).filter(Boolean).sort(function(a, b) {
      return (b.updatedAt || 0) - (a.updatedAt || 0);
    }).slice(0, HISTORY_LIMIT);
  }

  function snapshotCurrentBuild() {
    if (!state.currentBuildId && !state.variants.length) return null;
    if (!state.currentBuildId) state.currentBuildId = uid('build');
    var variants = sanitizeVariants(state.variants);
    if (!variants.length) return null;
    var existing = state.history.find(function(item) { return item.id === state.currentBuildId; });
    var prompt = (variants[0] ? variants[0].prompt : '') || currentPromptValue();
    var createdAt = existing ? existing.createdAt : Date.now();
    var activeId = state.activeVariantId && variants.some(function(variant) { return variant.id === state.activeVariantId; })
      ? state.activeVariantId
      : variants[0].id;
    return {
      id: state.currentBuildId,
      title: historyTitle(prompt, createdAt),
      prompt: prompt,
      variants: variants,
      activeVariantId: activeId,
      wantedRefs: sanitizeWantedRefs(state.wantedRefs),
      createdAt: createdAt,
      updatedAt: Date.now()
    };
  }

  function syncCurrentBuildToHistory() {
    var snapshot = snapshotCurrentBuild();
    if (!snapshot) return;
    state.history = [snapshot].concat(state.history.filter(function(item) { return item.id !== snapshot.id; }))
      .sort(function(a, b) { return (b.updatedAt || 0) - (a.updatedAt || 0); })
      .slice(0, HISTORY_LIMIT);
  }

  function serializeBuilderState() {
    return {
      version: STATE_VERSION,
      currentBuildId: state.currentBuildId,
      prompt: currentPromptValue(),
      variantCount: state.variantCount,
      variants: sanitizeVariants(state.variants),
      activeVariantId: state.activeVariantId,
      wantedRefs: sanitizeWantedRefs(state.wantedRefs),
      history: sanitizeHistory(state.history),
      updatedAt: Date.now()
    };
  }

  function applyPersistedState(saved) {
    if (!saved || typeof saved !== 'object') return false;
    var variants = sanitizeVariants(saved.variants);
    var history = sanitizeHistory(saved.history);
    state.history = history;
    state.currentBuildId = typeof saved.currentBuildId === 'string' && saved.currentBuildId ? saved.currentBuildId : (variants.length ? uid('build') : null);
    if (Number(saved.variantCount) >= 1 && Number(saved.variantCount) <= 3) state.variantCount = Number(saved.variantCount);
    state.variants = variants;
    state.activeVariantId = typeof saved.activeVariantId === 'string' && variants.some(function(variant) { return variant.id === saved.activeVariantId; })
      ? saved.activeVariantId
      : (variants[0] ? variants[0].id : null);
    state.wantedRefs = sanitizeWantedRefs(saved.wantedRefs);
    state.expandedVariantId = null;
    if (typeof saved.prompt === 'string' && $('prompt')) {
      $('prompt').value = saved.prompt;
    }
    setVariantCount(state.variantCount);
    return true;
  }

  function hydratePersistedState() {
    if (!window.contex || !window.contex.tile || typeof window.contex.tile.getState !== 'function') return Promise.resolve(false);
    state.loadingPersistedState = true;
    return window.contex.tile.getState(TILE_STATE_KEY).then(function(saved) {
      if (saved && typeof saved === 'object') applyPersistedState(saved);
      return true;
    }).catch(function() {
      return false;
    }).then(function(result) {
      state.loadingPersistedState = false;
      render();
      return result;
    });
  }

  function persistBuilderState() {
    if (state.loadingPersistedState) return;
    syncCurrentBuildToHistory();
    var snapshot = serializeBuilderState();
    saveLocalState(snapshot);
    if (window.contex && window.contex.tile && typeof window.contex.tile.setState === 'function') {
      window.contex.tile.setState(TILE_STATE_KEY, snapshot).catch(function() {});
    }
  }

  function schedulePersistBuilderState() {
    if (state.loadingPersistedState) return;
    if (persistTimer) clearTimeout(persistTimer);
    persistTimer = setTimeout(function() {
      persistTimer = null;
      persistBuilderState();
    }, state.generating ? 250 : 120);
  }

  function uid(prefix) {
    return prefix + '-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
  }

  function truncate(text, len) {
    var value = String(text || '').trim();
    return value.length > len ? value.slice(0, len - 1) + '…' : value;
  }

  function escapeHtml(text) {
    return String(text || '').replace(/[&<>"']/g, function(ch) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
    });
  }

  function currentThemeMode() {
    return document.documentElement.getAttribute('data-ct-mode') || 'light';
  }

  function activeVariant() {
    return state.variants.find(function(variant) { return variant.id === state.activeVariantId; }) || null;
  }

  function wantedRefs() {
    return state.wantedRefs || [];
  }

  function syncPromptHeight() {
    var input = $('prompt');
    if (!input) return;
    input.style.height = 'auto';
    var minHeight = state.renderMode === 'chat' ? 38 : 42;
    var maxHeight = state.renderMode === 'chat' ? 88 : 120;
    input.style.height = Math.max(minHeight, Math.min(input.scrollHeight, maxHeight)) + 'px';
  }

  function stripFences(text) {
    if (!text) return '';
    return String(text).replace(/^```[\w-]*\s*/gm, '').replace(/\s*```$/gm, '').trim();
  }

  function extractHtmlOnly(raw) {
    var text = stripFences(raw || '').trim();
    if (!text) return '';
    var docMatch = text.match(/<!doctype html[\s\S]*<\/html>/i);
    if (docMatch) return docMatch[0].trim();
    var htmlMatch = text.match(/<html[\s\S]*<\/html>/i);
    if (htmlMatch) return htmlMatch[0].trim();
    var firstTag = text.search(/</);
    if (firstTag > 0) text = text.slice(firstTag).trim();
    var lastTagClose = text.lastIndexOf('>');
    if (lastTagClose >= 0) text = text.slice(0, lastTagClose + 1).trim();
    return text;
  }

  function buildSrcdoc(raw) {
    var html = extractHtmlOnly(raw || '');
    if (!html) return '';
    var mode = currentThemeMode();
    var bg = mode === 'dark' ? '#0f1117' : '#ffffff';
    var text = mode === 'dark' ? '#f3f5fb' : '#111111';
    var trimmed = html.trim().toLowerCase();
    if (trimmed.indexOf('<!doctype') === 0 || trimmed.indexOf('<html') === 0) return html;
    return '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"><\/script><style>*{box-sizing:border-box}html,body{margin:0;padding:0;background:' + bg + ';color:' + text + ';font-family:system-ui,-apple-system,sans-serif}body{display:block;min-height:0}.preview-root{display:block;padding:0;min-height:0}</style></head><body><div class="preview-root">' + html + '</div></body></html>';
  }

  function showError(message) {
    $('errorBox').style.display = 'block';
    $('errorBox').textContent = message;
  }

  function hideError() {
    $('errorBox').style.display = 'none';
    $('errorBox').textContent = '';
  }

  function setGenerating(value) {
    state.generating = value;
    var generateBtn = $('generateBtn');
    if (generateBtn) generateBtn.disabled = value || !state.config.apiKey;
    var statusPill = $('statusPill');
    if (statusPill) statusPill.textContent = value ? 'generating' : (state.variants.length ? 'ready' : 'empty');
  }

  function setVariantCount(count) {
    state.variantCount = count;
    Array.prototype.forEach.call(document.querySelectorAll('#variantCountControl .segment-btn'), function(button) {
      button.classList.toggle('active', Number(button.getAttribute('data-count')) === count);
    });
    schedulePersistBuilderState();
  }

  function selectVariant(id) {
    state.activeVariantId = id;
    render();
    schedulePersistBuilderState();
  }

  function toggleWantedRef(variant) {
    var existingIndex = state.wantedRefs.findIndex(function(item) { return item.sourceId === variant.id; });
    if (existingIndex >= 0) {
      state.wantedRefs = state.wantedRefs.filter(function(item) { return item.sourceId !== variant.id; });
    } else {
      state.wantedRefs = state.wantedRefs.concat({
        sourceId: variant.id,
        label: variant.label,
        html: variant.html,
      });
    }
    render();
    schedulePersistBuilderState();
  }

  function openExpandedVariant(id) {
    state.expandedVariantId = id;
    renderExpandedVariant();
    $('expandOverlay').style.display = 'flex';
  }

  function closeExpandedVariant() {
    $('expandOverlay').style.display = 'none';
    state.expandedVariantId = null;
  }

  function isVariantWanted(variantId) {
    return state.wantedRefs.some(function(item) { return item.sourceId === variantId; });
  }

  function restoreHistoryItem(buildId) {
    var item = state.history.find(function(entry) { return entry.id === buildId; });
    if (!item) return;
    state.currentBuildId = item.id;
    state.variants = sanitizeVariants(item.variants);
    state.activeVariantId = item.activeVariantId && state.variants.some(function(variant) { return variant.id === item.activeVariantId; })
      ? item.activeVariantId
      : (state.variants[0] ? state.variants[0].id : null);
    state.wantedRefs = sanitizeWantedRefs(item.wantedRefs);
    state.expandedVariantId = null;
    if ($('prompt')) $('prompt').value = item.prompt || '';
    hideError();
    render();
    schedulePersistBuilderState();
  }

  function publishChatSurfacePayload(htmlValue) {
    if (!window.contex || !window.contex.surface) return;
    var cleanHtml = extractHtmlOnly(htmlValue || '');
    if (!cleanHtml) {
      window.contex.surface.clear();
      return;
    }
    window.contex.surface.setPayload({ kind: 'text', data: cleanHtml, mime: 'text/html', ext: 'html' });
  }

  function publishBuilderContext(status, errorMessage) {
    if (!state.contexReady || !window.contex || !window.contex.context) return;
    var selected = activeVariant();
    var summaries = state.variants.map(function(variant, index) {
      return {
        id: variant.id,
        label: variant.label,
        index: index,
        prompt: truncate(variant.prompt, 140),
        html: truncate(variant.html, 160),
      };
    });
    var historySummaries = state.history.slice(0, 12).map(function(item) {
      return {
        id: item.id,
        title: item.title,
        prompt: truncate(item.prompt, 140),
        variantCount: item.variants.length,
        updatedAt: item.updatedAt,
      };
    });
    window.contex.context.set('ctx:artifact:ready', !!selected);
    window.contex.context.set('ctx:artifact:status', status || (state.generating ? 'generating' : (selected ? 'ready' : 'empty')));
    window.contex.context.set('ctx:artifact:html', selected ? selected.html : '');
    window.contex.context.set('ctx:artifact:variants', summaries);
    window.contex.context.set('ctx:builder:variantCount', state.variantCount);
    window.contex.context.set('ctx:builder:currentBuildId', state.currentBuildId);
    window.contex.context.set('ctx:builder:history', historySummaries);
    if (errorMessage !== undefined) window.contex.context.set('ctx:artifact:error', errorMessage || null);
    publishChatSurfacePayload(selected ? selected.html : '');
  }

  function peerContextText() {
    var lines = [];
    Object.keys(state.peerContext).forEach(function(peerId) {
      var bucket = state.peerContext[peerId] || {};
      Object.keys(bucket).forEach(function(key) {
        var value = bucket[key];
        var rendered = typeof value === 'string' ? value : JSON.stringify(value);
        lines.push('[' + peerId + '] ' + key + ': ' + truncate(rendered, 180));
      });
    });
    return lines.length ? '\n\nPeer context:\n' + lines.join('\n') : '';
  }

  function buildWantedContextText() {
    if (!state.wantedRefs.length) return '';
    return '\n\nWanted reference variants:\n' + state.wantedRefs.map(function(snapshot, index) {
      return 'Reference ' + (index + 1) + ' (' + snapshot.label + '):\n' + snapshot.html;
    }).join('\n\n');
  }

  function buildUserPrompt(basePrompt, index, total) {
    var mode = currentThemeMode();
    var hasWanted = state.wantedRefs.length > 0;
    var intro;
    if (hasWanted) {
      intro = total > 1
        ? 'Generate variant ' + index + ' of ' + total + ' by modifying the wanted reference variants according to the requested changes.'
        : 'Modify the wanted reference variants according to the requested changes.';
    } else {
      intro = total > 1
        ? 'Generate variant ' + index + ' of ' + total + '. Make it meaningfully different in hierarchy, layout, emphasis, and spacing while preserving the same product intent.'
        : 'Generate a polished premium UI from this prompt.';
    }
    return [
      intro,
      'Default visual theme: ' + mode + '.',
      'Scope rule: if this prompt describes a component or partial UI, return only that component at natural bounds. Do not generate a full phone screen, browser shell, or empty page chrome unless explicitly requested.',
      basePrompt.trim(),
      buildWantedContextText(),
      peerContextText()
    ].filter(Boolean).join('\n\n');
  }

  async function generateVariants() {
    var prompt = $('prompt').value.trim();
    if (!prompt || state.generating || !state.config.apiKey) return;
    hideError();
    if (state.abortCtrl) state.abortCtrl.abort();
    state.abortCtrl = new AbortController();

    state.currentBuildId = uid('build');
    state.variants = [];
    state.activeVariantId = null;
    setGenerating(true);
    render();
    schedulePersistBuilderState();

    try {
      for (var i = 1; i <= state.variantCount; i++) {
        var variant = {
          id: uid('variant'),
          label: 'Variant ' + i,
          prompt: prompt,
          html: '',
          status: 'generating'
        };
        state.variants.push(variant);
        state.activeVariantId = variant.id;
        render();

        var response = await fetch(state.config.baseUrl.replace(/\/+$/, '') + '/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + state.config.apiKey
          },
          body: JSON.stringify({
            model: state.config.model,
            stream: true,
            max_tokens: 16384,
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              { role: 'user', content: buildUserPrompt(prompt, i, state.variantCount) }
            ]
          }),
          signal: state.abortCtrl.signal
        });
        if (!response.ok) {
          var problem = await response.json().catch(function() { return {}; });
          throw new Error((problem.error && problem.error.message) || ('API error ' + response.status));
        }

        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';
        var accumulated = '';
        while (true) {
          var chunk = await reader.read();
          if (chunk.done) break;
          buffer += decoder.decode(chunk.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop();
          for (var lineIndex = 0; lineIndex < lines.length; lineIndex++) {
            var line = lines[lineIndex].trim();
            if (!line || line.indexOf('data: ') !== 0) continue;
            var data = line.slice(6);
            if (data === '[DONE]') continue;
            try {
              var parsed = JSON.parse(data);
              var choice = parsed.choices && parsed.choices[0] ? parsed.choices[0] : null;
              var content = choice && choice.delta && choice.delta.content;
              if (content) {
                accumulated += content;
                variant.html = extractHtmlOnly(accumulated);
                render();
              }
            } catch (err) {}
          }
        }
        variant.html = extractHtmlOnly(accumulated);
        variant.status = variant.html ? 'ready' : 'error';
        render();
      }
      publishBuilderContext('ready', null);
    } catch (error) {
      if (!(error && error.name === 'AbortError')) {
        showError(error.message || String(error));
        publishBuilderContext('error', error.message || String(error));
      }
    } finally {
      state.abortCtrl = null;
      setGenerating(false);
      render();
    }
  }

  function renderWantedChips() {
    var root = $('wantedChips');
    root.innerHTML = '';
    state.wantedRefs.forEach(function(snapshot) {
      var chip = document.createElement('div');
      chip.className = 'wanted-chip';
      chip.innerHTML = '<span>' + escapeHtml(snapshot.label) + '</span>';
      var close = document.createElement('button');
      close.type = 'button';
      close.textContent = '×';
      close.onclick = function(event) {
        event.stopPropagation();
        state.wantedRefs = state.wantedRefs.filter(function(item) { return item.sourceId !== snapshot.sourceId; });
        render();
      };
      chip.appendChild(close);
      root.appendChild(chip);
    });
  }

  function renderGrid() {
    var grid = $('variantGrid');
    var empty = $('emptyState');
    grid.innerHTML = '';
    empty.style.display = state.variants.length ? 'none' : 'flex';
    $('variantCounter').textContent = state.variants.length + ' variant' + (state.variants.length === 1 ? '' : 's');
    if (!state.variants.length) return;

    grid.style.gridTemplateColumns = 'repeat(' + state.variants.length + ', minmax(0, 1fr))';

    state.variants.forEach(function(variant) {
      var card = document.createElement('div');
      card.className = 'variant-card' + (variant.id === state.activeVariantId ? ' active' : '');
      card.onclick = function() { selectVariant(variant.id); };

      var wanted = isVariantWanted(variant.id);

      card.innerHTML = ''
        + '<div class="variant-top">'
        + '  <div class="variant-title">' + escapeHtml(variant.label) + '</div>'
        + '  <div class="variant-actions">'
        + '    <button type="button" class="control-btn" data-action="expand" title="Expand">↗</button>'
        + '    <button type="button" class="control-btn' + (wanted ? ' active' : '') + '" data-action="want" title="Want this variant">★ <span>' + (wanted ? 'Wanted' : 'Want') + '</span></button>'
        + '  </div>'
        + '</div>'
        + '<div class="variant-preview"><iframe sandbox="allow-scripts allow-same-origin" title="' + escapeHtml(variant.label) + '"></iframe></div>';

      card.querySelector('[data-action="expand"]').onclick = function(event) {
        event.stopPropagation();
        openExpandedVariant(variant.id);
      };
      card.querySelector('[data-action="want"]').onclick = function(event) {
        event.stopPropagation();
        toggleWantedRef(variant);
      };
      card.querySelector('iframe').srcdoc = buildSrcdoc(variant.html || '');
      grid.appendChild(card);
    });
  }

  function renderExpandedVariant() {
    var variant = state.variants.find(function(item) { return item.id === state.expandedVariantId; }) || null;
    $('expandTitle').textContent = variant ? variant.label : 'Variant';
    $('expandSubtitle').textContent = variant ? truncate(variant.prompt || 'Expanded preview', 180) : 'Expanded preview';
    $('expandPreview').srcdoc = variant ? buildSrcdoc(variant.html || '') : '';
  }

  function renderContextSummary() {
    var count = 0;
    Object.keys(state.peerContext).forEach(function(peerId) {
      count += Object.keys(state.peerContext[peerId] || {}).length;
    });

    if (state.wantedRefs.length > 0) {
      $('peerContextSummary').textContent = 'Wanted chips will be used as reference context for the next generation.';
      return;
    }

    if (count > 0) {
      $('peerContextSummary').textContent = count + ' context item' + (count === 1 ? '' : 's') + ' from other chat surfaces will be included.';
      return;
    }

    $('peerContextSummary').textContent = '';
  }

  function renderHistoryControls() {
    var select = $('historySelect');
    if (!select) return;
    select.innerHTML = '';
    var history = sanitizeHistory(state.history);
    state.history = history;
    if (!history.length) {
      var emptyOption = document.createElement('option');
      emptyOption.value = '';
      emptyOption.textContent = 'No build history';
      select.appendChild(emptyOption);
      select.disabled = true;
      return;
    }
    select.disabled = false;
    var placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = 'Build history';
    select.appendChild(placeholder);
    history.forEach(function(item) {
      var option = document.createElement('option');
      option.value = item.id;
      option.textContent = item.id === state.currentBuildId ? 'Current: ' + item.title : item.title;
      select.appendChild(option);
    });
    select.value = state.currentBuildId || '';
  }

  function render() {
    syncCurrentBuildToHistory();
    renderWantedChips();
    renderGrid();
    renderHistoryControls();
    renderContextSummary();
    renderExpandedVariant();
    syncPromptHeight();
    publishBuilderContext(state.generating ? 'generating' : (state.variants.length ? 'ready' : 'empty'), null);
    schedulePersistBuilderState();
  }

  function openSettings() {
    $('settApiKey').value = state.config.apiKey;
    $('settModel').value = state.config.model;
    $('settBaseUrl').value = state.config.baseUrl;
    $('settingsOverlay').style.display = 'flex';
  }

  function closeSettings() {
    $('settingsOverlay').style.display = 'none';
  }

  function saveSettingsFromUI() {
    state.config.apiKey = $('settApiKey').value.trim();
    state.config.model = $('settModel').value.trim() || DEFAULTS.model;
    state.config.baseUrl = $('settBaseUrl').value.trim() || DEFAULTS.baseUrl;
    saveConfig(state.config);
    closeSettings();
    hideError();
    setGenerating(false);
    render();
  }

  function initContex() {
    if (!window.contex || state.contexReady) return;
    state.contexReady = true;
    hydratePersistedState();

    if (window.contex.context) {
      window.contex.context.onPeerContextChanged(function(data) {
        if (!data.peerId || !data.key) return;
        state.peerContext[data.peerId] = state.peerContext[data.peerId] || {};
        state.peerContext[data.peerId][data.key] = data.value;
        render();
      });
    }

    if (window.contex.actions) {
      window.contex.actions.register('generate', 'Generate Builder variants from a prompt', function(params) {
        var prompt = params && (params.prompt || params.description) ? String(params.prompt || params.description) : '';
        if (!prompt) return { ok: false, error: 'Missing prompt' };
        $('prompt').value = prompt;
        if (params && params.variantCount) {
          var nextCount = Number(params.variantCount);
          if (nextCount >= 1 && nextCount <= 3) setVariantCount(nextCount);
        }
        setTimeout(generateVariants, 50);
        return { ok: true, status: 'generating' };
      });

      window.contex.actions.register('setHtml', 'Set the current Builder HTML directly', function(params) {
        var html = params && (params.html || params.content) ? String(params.html || params.content) : '';
        var cleanHtml = extractHtmlOnly(html);
        if (!cleanHtml) return { ok: false, error: 'Missing html' };
        state.currentBuildId = uid('build');
        state.variants = [{ id: uid('variant'), label: 'Variant 1', prompt: $('prompt').value.trim(), html: cleanHtml, status: 'ready' }];
        state.activeVariantId = state.variants[0].id;
        syncCurrentBuildToHistory();
        render();
        persistBuilderState();
        return { ok: true };
      });

      window.contex.actions.register('getHtml', 'Get the selected Builder HTML', function() {
        var selected = activeVariant();
        return {
          html: selected ? selected.html : '',
          variantCount: state.variants.length,
          status: state.generating ? 'generating' : (selected ? 'ready' : 'empty')
        };
      });

      window.contex.actions.register('getStatus', 'Get Builder generation status', function() {
        return {
          status: state.generating ? 'generating' : (state.variants.length ? 'ready' : 'empty'),
          variantCount: state.variants.length,
          activeVariantId: state.activeVariantId,
          currentBuildId: state.currentBuildId,
          historyCount: state.history.length
        };
      });

      window.contex.actions.register('setPrompt', 'Set the current Builder prompt', function(params) {
        $('prompt').value = params && params.prompt ? String(params.prompt) : '';
        syncPromptHeight();
        schedulePersistBuilderState();
        return { ok: true };
      });

      window.contex.actions.register('setSettings', 'Update Builder settings', function(params) {
        if (params.model) state.config.model = String(params.model);
        if (params.baseUrl) state.config.baseUrl = String(params.baseUrl);
        if (params.apiKey) state.config.apiKey = String(params.apiKey);
        saveConfig(state.config);
        render();
        return { ok: true, model: state.config.model };
      });
    }

    if (window.contex.surface) {
      window.contex.surface.onRequestFlush(function() {
        publishBuilderContext(state.generating ? 'generating' : (state.variants.length ? 'ready' : 'empty'), null);
      });

      window.contex.surface.onClear(function() {
        if (state.abortCtrl) state.abortCtrl.abort();
        state.abortCtrl = null;
        state.variants = [];
        state.activeVariantId = null;
        state.wantedRefs = [];
        state.expandedVariantId = null;
        state.currentBuildId = null;
        state.generating = false;
        state.peerContext = {};
        $('prompt').value = '';
        hideError();
        setGenerating(false);
        closeExpandedVariant();
        render();
      });
    }

    render();
  }

  function bootstrap() {
    Array.prototype.forEach.call(document.querySelectorAll('#variantCountControl .segment-btn'), function(button) {
      button.onclick = function() { setVariantCount(Number(button.getAttribute('data-count'))); };
    });
    $('historySelect').onchange = function() {
      if (this.value) restoreHistoryItem(this.value);
    };

    state.loadingPersistedState = true;
    applyPersistedState(loadLocalState());
    state.loadingPersistedState = false;

    setVariantCount(state.variantCount);
    $('generateBtn').onclick = generateVariants;
    $('settingsBtn').onclick = openSettings;
    $('settingsCancelBtn').onclick = closeSettings;
    $('settingsSaveBtn').onclick = saveSettingsFromUI;
    $('settingsOverlay').onclick = function(event) { if (event.target === $('settingsOverlay')) closeSettings(); };
    $('expandOverlay').onclick = function(event) { if (event.target === $('expandOverlay')) closeExpandedVariant(); };
    $('expandCloseBtn').onclick = closeExpandedVariant;
    $('prompt').addEventListener('input', function() {
      syncPromptHeight();
      schedulePersistBuilderState();
    });
    $('prompt').addEventListener('keydown', function(event) {
      if (event.key === 'Enter' && (event.metaKey || event.ctrlKey)) {
        event.preventDefault();
        generateVariants();
      }
    });
    window.addEventListener('pagehide', persistBuilderState);
    window.addEventListener('beforeunload', persistBuilderState);

    if (!state.config.apiKey) showError('Set your API key in Builder settings to enable generation.');
    setGenerating(false);
    syncPromptHeight();
    render();

    var initDone = false;
    function tryInitContex() {
      if (initDone || !window.contex) return;
      initDone = true;
      initContex();
    }

    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'contex-bridge-ready') tryInitContex();
    });

    tryInitContex();
    setTimeout(tryInitContex, 0);
    setTimeout(tryInitContex, 50);
    setTimeout(tryInitContex, 150);
  }

  bootstrap();
</script>
</body>
</html>
