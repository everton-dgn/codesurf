<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    background: transparent;
  }

  body {
    font-family: var(--ct-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
    color: var(--ct-text, #111);
    overflow: hidden;
  }

  .app {
    width: 100%;
    height: 100%;
    padding: 0;
  }

  .surface {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 7px 10px 8px;
    border-radius: 0;
    background: transparent;
    border: none;
    overflow: hidden;
  }

  .surface-header {
    display: none;
  }

  .surface-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--ct-accent-s, rgba(79,70,229,.12));
    color: var(--ct-accent, #4f46e5);
    border: 1px solid color-mix(in srgb, var(--ct-accent, #4f46e5) 18%, transparent);
    font-size: 14px;
    flex-shrink: 0;
  }

  .surface-copy {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .surface-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ct-text, #111);
  }

  .surface-subtitle {
    font-size: 11px;
    line-height: 1.35;
    color: var(--ct-dim, #999);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .variant-region {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
  }

  .variant-head {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    min-height: 24px;
    flex-shrink: 0;
  }

  .variant-head-actions {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    flex-shrink: 0;
  }

  /* history-select = themed base <select> (bg/border/color/focus from the kit) + pill shape. */
  .history-select {
    max-width: 190px;
    height: 26px;
    padding: 0 8px;
    border-radius: 999px;
    font-size: 11px;
  }

  .history-select:disabled {
    opacity: 0.55;
  }

  .variant-head-copy {
    display: none;
  }

  .variant-head-title,
  .variant-head-subtitle {
    display: none;
  }

  .variant-grid-wrap {
    flex: 1;
    min-height: 0;
    overflow: auto;
  }

  .variant-grid {
    display: grid;
    gap: 7px;
    min-height: 100%;
  }

  .variant-card {
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 7px;
    border-radius: 12px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    cursor: pointer;
    transition: border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
  }

  .variant-card:hover {
    border-color: var(--ct-border-2, rgba(0,0,0,.16));
    background: var(--ct-hover, rgba(0,0,0,.08));
  }

  .variant-card.active {
    border-color: color-mix(in srgb, var(--ct-accent, #4f46e5) 28%, transparent);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--ct-accent, #4f46e5) 14%, transparent);
  }

  .variant-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-height: 27px;
  }

  .variant-title {
    min-width: 0;
    font-size: 12px;
    font-weight: 700;
    color: var(--ct-text, #111);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .variant-actions {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  /* control-btn = themed base <button> (bg/border/color/hover from the kit) + compact geometry. */
  .control-btn {
    height: 28px;
    padding: 0 9px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 11px;
    line-height: 1;
  }

  .control-btn.active {
    border-color: color-mix(in srgb, var(--ct-accent, #4f46e5) 24%, transparent);
    background: var(--ct-accent-s, rgba(79,70,229,.12));
    color: var(--ct-accent, #4f46e5);
  }

  .variant-preview {
    flex: 1;
    min-height: 160px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel, rgba(0,0,0,.04));
  }

  .variant-preview iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
  }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 180px;
    height: 100%;
    padding: 24px;
    border-radius: 12px;
    border: 1px dashed var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    color: var(--ct-dim, #999);
    text-align: center;
    line-height: 1.45;
  }

  .composer {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--ct-border, rgba(0,0,0,.1));
  }

  .wanted-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 0;
  }

  .wanted-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 999px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    font-size: 10px;
    color: var(--ct-text, #111);
  }

  .wanted-chip button {
    appearance: none;
    border: none;
    background: transparent;
    color: inherit;
    cursor: pointer;
    padding: 0;
    font-size: 11px;
    line-height: 1;
  }

  .design-mode-panel {
    display: flex;
    flex-direction: column;
    gap: 7px;
    padding: 8px;
    border-radius: 14px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: color-mix(in srgb, var(--ct-panel-2, rgba(0,0,0,.06)) 72%, transparent);
  }

  .design-mode-head,
  .prompt-chip-row,
  .visual-refs {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .design-mode-title {
    font-size: 10px;
    font-weight: 780;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ct-dim, #999);
    margin-right: auto;
  }

  .prompt-chip,
  .visual-ref-card {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 26px;
    border-radius: 999px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel, rgba(0,0,0,.04));
    color: var(--ct-text, #111);
    font-size: 10px;
  }

  .prompt-chip {
    padding: 0 9px;
  }

  .visual-ref-card {
    max-width: 210px;
    padding: 3px 7px 3px 3px;
  }

  .visual-ref-card img {
    width: 26px;
    height: 18px;
    border-radius: 6px;
    object-fit: cover;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    flex-shrink: 0;
  }

  .visual-ref-label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .visual-ref-card button {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--ct-dim, #999);
    cursor: pointer;
    padding: 0;
    font-size: 11px;
    line-height: 1;
  }

  .design-drop-active .design-mode-panel {
    border-color: color-mix(in srgb, var(--ct-accent, #4f46e5) 42%, transparent);
    background: var(--ct-accent-s, rgba(79,70,229,.12));
  }

  .composer-frame {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 16px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: transparent;
  }

  .composer-input {
    width: 100%;
    min-height: 42px;
    max-height: 120px;
    resize: none;
    border: none;
    background: transparent;
    color: var(--ct-text, #111);
    font: inherit;
    line-height: 1.45;
    outline: none;
    box-shadow: none;
    padding: 0;
    margin: 0;
    overflow-y: auto;
  }

  .composer-input:focus {
    outline: none;
    box-shadow: none;
  }

  .composer-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .segmented {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px;
    border-radius: 999px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    flex-shrink: 0;
  }

  .segment-btn {
    min-width: 30px;
    height: 24px;
    padding: 0 8px;
    border-radius: 999px;
    border-color: transparent;
    background: transparent;
    color: var(--ct-dim, #999);
    font-size: 10px;
    line-height: 1;
  }

  .segment-btn.active {
    background: var(--ct-accent-s, rgba(79,70,229,.12));
    border-color: color-mix(in srgb, var(--ct-accent, #4f46e5) 20%, transparent);
    color: var(--ct-accent, #4f46e5);
  }

  .composer-meta {
    min-width: 0;
    flex: 1;
    font-size: 11px;
    line-height: 1.35;
    color: var(--ct-dim, #999);
  }

  .send-btn {
    width: 30px;
    height: 30px;
    min-width: 30px;
    padding: 0;
    border-radius: 999px;
    border: none;
    background: var(--ct-accent, #4f46e5);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    line-height: 1;
    flex-shrink: 0;
  }

  .send-btn:hover:not(:disabled) {
    background: var(--ct-accent, #4f46e5);
    opacity: 0.88;
  }

  .send-btn:disabled {
    opacity: 0.5;
    cursor: default;
  }

  .error {
    display: none;
    font-size: 11px;
    line-height: 1.45;
    color: var(--ct-danger, #dc2626);
  }

  .settings-overlay,
  .expand-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.36);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }

  .settings-panel,
  .expand-panel {
    width: min(520px, 100%);
    max-height: 100%;
    overflow: hidden;
  }

  .settings-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px;
  }

  .settings-actions,
  .expand-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 12px;
  }

  .expand-copy {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 12px 12px 0 12px;
  }

  .expand-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ct-text, #111);
  }

  .expand-subtitle {
    font-size: 11px;
    line-height: 1.35;
    color: var(--ct-dim, #999);
  }

  .expand-preview {
    height: min(72vh, 720px);
    padding: 12px;
  }

  .expand-preview-frame {
    width: 100%;
    height: 100%;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel, rgba(0,0,0,.04));
  }

  .expand-preview-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
  }

  html[data-render-mode="chat"] .app {
    padding: 8px;
  }

  html[data-render-mode="chat"] .surface {
    padding: 8px;
    gap: 6px;
    border-radius: 14px;
  }

  html[data-render-mode="chat"] .surface-header {
    display: none;
  }

  html[data-render-mode="chat"] .variant-head-subtitle {
    display: none;
  }

  html[data-render-mode="chat"] .history-select {
    max-width: 132px;
  }

  html[data-render-mode="chat"] .variant-preview {
    min-height: 132px;
  }

  html[data-render-mode="chat"] .composer {
    gap: 6px;
    padding-top: 6px;
  }

  html[data-render-mode="chat"] .composer-frame {
    padding: 8px 10px;
    border-radius: 14px;
  }

  html[data-render-mode="chat"] .composer-input {
    min-height: 38px;
    max-height: 88px;
  }

  html[data-render-mode="chat"] .composer-meta {
    display: none;
  }

  html[data-render-mode="chat"] .settings-label {
    display: none;
  }

  html[data-render-mode="canvas"] .app,
  html[data-render-mode="docked"] .app {
    padding: 0;
  }

  html[data-render-mode="canvas"] .surface,
  html[data-render-mode="docked"] .surface {
    padding: 6px 9px 8px;
    gap: 5px;
  }

  html[data-render-mode="canvas"] .variant-preview,
  html[data-render-mode="docked"] .variant-preview {
    min-height: 260px;
  }

  @media (max-width: 980px) {
    .variant-grid {
      grid-template-columns: 1fr !important;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="surface">
      <div class="surface-header">
        <div class="surface-icon">✦</div>
        <div class="surface-copy">
          <div class="surface-title">Builder</div>
          <div class="surface-subtitle">Generate variants, want references, and request changes from the bottom composer.</div>
        </div>
      </div>

      <div class="variant-region">
        <div class="variant-head">
          <div class="variant-head-copy">
            <div class="variant-head-title">Variants</div>
            <div class="variant-head-subtitle">Large previews side by side in the active light or dark theme.</div>
          </div>
          <div class="variant-head-actions">
            <select id="historySelect" class="history-select" title="Build history" aria-label="Build history"></select>
            <div id="variantCounter" class="ct-pill">0 variants</div>
          </div>
        </div>
        <div class="variant-grid-wrap">
          <div id="variantGrid" class="variant-grid"></div>
          <div id="emptyState" class="empty-state">Enter a prompt below, choose 1 / 2 / 3, and generate.</div>
        </div>
      </div>

      <div class="composer">
        <input id="screenshotInput" type="file" accept="image/*" multiple hidden>
        <div id="wantedChips" class="wanted-chips"></div>
        <div class="design-mode-panel" id="designModePanel">
          <div class="design-mode-head">
            <div class="design-mode-title">Frontend / design mode</div>
            <button id="screenshotBtn" type="button" class="control-btn" title="Import screenshots">＋ Screenshot</button>
            <button id="qaHandoffBtn" type="button" class="control-btn" title="Open QA/browser evidence report">QA evidence</button>
          </div>
          <div class="prompt-chip-row">
            <button type="button" class="prompt-chip" data-template="match-screenshot">Match screenshot</button>
            <button type="button" class="prompt-chip" data-template="visual-verify">Visual verify</button>
            <button type="button" class="prompt-chip" data-template="qa-fix">Fix QA/browser issues</button>
          </div>
          <div id="visualRefs" class="visual-refs"></div>
        </div>
        <div class="composer-frame">
          <textarea id="prompt" class="composer-input" rows="2" placeholder="Describe the design you want, or request changes to wanted variants."></textarea>
          <div class="composer-row">
            <div id="variantCountControl" class="segmented">
              <button type="button" class="segment-btn" data-count="1">1</button>
              <button type="button" class="segment-btn" data-count="2">2</button>
              <button type="button" class="segment-btn" data-count="3">3</button>
            </div>
            <div id="peerContextSummary" class="composer-meta"></div>
            <button id="settingsBtn" type="button" class="control-btn" title="Settings">⚙ <span class="settings-label">Settings</span></button>
            <button id="generateBtn" type="button" class="send-btn" title="Generate variants" aria-label="Generate variants">↑</button>
          </div>
        </div>
        <div id="errorBox" class="error"></div>
      </div>
    </div>
  </div>

  <div id="settingsOverlay" class="settings-overlay">
    <div class="ct-card settings-panel">
      <div class="ct-toolbar" style="padding:12px 12px 0 12px;border-bottom:none;">
        <div class="ct-toolbar-title">⚙ Builder settings</div>
      </div>
      <div class="settings-body">
        <div class="ct-field">
          <label class="ct-field-label" for="settApiKey">API Key</label>
          <input id="settApiKey" type="password" placeholder="sk-or-... or sk-...">
        </div>
        <div class="ct-field">
          <label class="ct-field-label" for="settModel">Model</label>
          <input id="settModel" type="text" placeholder="anthropic/claude-sonnet-4">
        </div>
        <div class="ct-field">
          <label class="ct-field-label" for="settBaseUrl">API Base URL</label>
          <input id="settBaseUrl" type="text" placeholder="https://openrouter.ai/api/v1">
        </div>
      </div>
      <div class="settings-actions">
        <button id="settingsCancelBtn" type="button">Cancel</button>
        <button id="settingsSaveBtn" type="button" class="primary">Save</button>
      </div>
    </div>
  </div>

  <div id="expandOverlay" class="expand-overlay">
    <div class="ct-card expand-panel">
      <div class="expand-copy">
        <div id="expandTitle" class="expand-title">Variant</div>
        <div id="expandSubtitle" class="expand-subtitle">Expanded preview</div>
      </div>
      <div class="expand-preview">
        <div class="expand-preview-frame">
          <iframe id="expandPreview" sandbox="allow-scripts allow-same-origin" title="Expanded variant preview"></iframe>
        </div>
      </div>
      <div class="expand-actions">
        <button id="expandCloseBtn" type="button">Close</button>
      </div>
    </div>
  </div>

<script>
  var DEFAULTS = { apiKey: '', model: 'anthropic/claude-sonnet-4', baseUrl: 'https://openrouter.ai/api/v1' };
  var STATE_VERSION = 1;
  var HISTORY_LIMIT = 30;
  var MAX_VISUAL_REFS = 6;
  var MAX_VISUAL_REF_EDGE = 1600;
  var PROMPT_TEMPLATES = {
    'match-screenshot': 'Use the imported screenshot(s) as the visual source of truth. Recreate the visible layout, density, hierarchy, spacing, radius, typography scale, color mood, and responsive behavior. Keep the output as production-ready HTML only.',
    'visual-verify': 'Run a visual verification pass against the imported screenshot(s), sketch context, wanted variants, and current QA evidence. Internally identify mismatches in spacing, hierarchy, contrast, overflow, copy, and interaction states, then return a corrected polished HTML variant only.',
    'qa-fix': 'Use the QA/browser evidence context to fix runtime issues, console errors, load failures, broken interactions, overflow, responsive bugs, and missing visible states. Preserve the intended screenshot DNA while returning only corrected HTML.'
  };
  var STATE_STORAGE_PREFIX = 'builder-state-v1:';
  var TILE_STATE_KEY = 'builderState';
  var persistTimer = null;
  var localStateKeyCache = null;
  var SYSTEM_PROMPT = 'You are an expert UI builder. Return ONLY valid HTML or a full HTML document. Never return markdown, code fences, or prose. Produce polished, product-facing UI with strong hierarchy, careful spacing, and restrained styling. Default to the host theme provided in the prompt unless the prompt explicitly asks for a different visual theme. IMPORTANT: match the requested scope. If the prompt asks for a component, control, tab bar, nav bar, card, panel, or other partial UI, output only that component at natural bounds. Do NOT wrap small UI in a full phone screen, browser window, device mockup, or giant empty application shell unless the prompt explicitly asks for that whole screen.';

  var state = {
    renderMode: deriveRenderMode(),
    config: loadConfig(),
    contexReady: false,
    variantCount: 3,
    variants: [],
    activeVariantId: null,
    wantedRefs: [],
    visualRefs: [],
    lastVisualPrompt: '',
    expandedVariantId: null,
    currentBuildId: null,
    history: [],
    loadingPersistedState: false,
    generating: false,
    abortCtrl: null,
    peerContext: {},
    localContext: {},
  };

  document.documentElement.setAttribute('data-render-mode', state.renderMode);

  function $(id) { return document.getElementById(id); }

  function deriveRenderMode() {
    try {
      var params = new URLSearchParams(window.location.search || '');
      var explicit = params.get('renderMode');
      if (explicit === 'chat' || explicit === 'canvas' || explicit === 'docked') return explicit;
      if (params.get('surfaceKind') === 'chat') return 'chat';
    } catch (err) {}
    return 'canvas';
  }

  function loadConfig() {
    try {
      var raw = localStorage.getItem('builder-config');
      return raw ? Object.assign({}, DEFAULTS, JSON.parse(raw)) : Object.assign({}, DEFAULTS);
    } catch (e) {
      return Object.assign({}, DEFAULTS);
    }
  }

  function saveConfig(config) {
    localStorage.setItem('builder-config', JSON.stringify(config));
  }

  function urlParam(name) {
    try {
      return new URLSearchParams(window.location.search || '').get(name) || '';
    } catch (err) {
      return '';
    }
  }

  function localStateKeys() {
    if (!localStateKeyCache) {
      var surfaceKind = urlParam('surfaceKind') || (urlParam('renderMode') === 'chat' ? 'chat' : '');
      var mode = surfaceKind === 'chat' ? 'chat' : 'tile';
      var id = urlParam('tileId') || urlParam('surfaceId') || (window.contex && window.contex.tileId) || 'default';
      localStateKeyCache = STATE_STORAGE_PREFIX + mode + ':' + id;
    }
    var keys = [localStateKeyCache];
    if (localStateKeyCache.indexOf(STATE_STORAGE_PREFIX + 'chat:') === 0) {
      keys.push(STATE_STORAGE_PREFIX + 'chat:latest');
    }
    return keys;
  }

  function loadLocalState() {
    var keys = localStateKeys();
    for (var i = 0; i < keys.length; i++) {
      try {
        var raw = localStorage.getItem(keys[i]);
        if (!raw) continue;
        var parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') return parsed;
      } catch (err) {}
    }
    return null;
  }

  function saveLocalState(snapshot) {
    var keys = localStateKeys();

          },
          body: JSON.stringify({
            model: state.config.model,
            stream: true,
            max_tokens: 16384,
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              { role: 'user', content: buildUserMessageContent(prompt, i, state.variantCount) }
            ]
          }),
          signal: state.abortCtrl.signal
        });
        if (!response.ok) {
          var problem = await response.json().catch(function() { return {}; });
          throw new Error((problem.error && problem.error.message) || ('API error ' + response.status));
        }

        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';
        var accumulated = '';
        while (true) {
          var chunk = await reader.read();
          if (chunk.done) break;
          buffer += decoder.decode(chunk.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop();
          for (var lineIndex = 0; lineIndex < lines.length; lineIndex++) {
            var line = lines[lineIndex].trim();
            if (!line || line.indexOf('data: ') !== 0) continue;
            var data = line.slice(6);
            if (data === '[DONE]') continue;
            try {
              var parsed = JSON.parse(data);
              var choice = parsed.choices && parsed.choices[0] ? parsed.choices[0] : null;
              var content = choice && choice.delta && choice.delta.content;
              if (content) {
                accumulated += content;
                variant.html = extractHtmlOnly(accumulated);
                render();
              }
            } catch (err) {}
          }
        }
        variant.html = extractHtmlOnly(accumulated);
        variant.status = variant.html ? 'ready' : 'error';
        render();
      }
      publishBuilderContext('ready', null);
    } catch (error) {
      if (!(error && error.name === 'AbortError')) {
        showError(error.message || String(error));
        publishBuilderContext('error', error.message || String(error));
      }
    } finally {
      state.abortCtrl = null;
      setGenerating(false);
      render();
    }
  }

  function loadImageElement(dataUrl) {
    return new Promise(function(resolve, reject) {
      var img = new Image();
      img.onload = function() { resolve(img); };
      img.onerror = reject;
      img.src = dataUrl;
    });
  }

  function downscaleDataUrl(dataUrl, mime) {
    return loadImageElement(dataUrl).then(function(img) {
      var width = img.naturalWidth || img.width || 1;
      var height = img.naturalHeight || img.height || 1;
      var scale = Math.min(1, MAX_VISUAL_REF_EDGE / Math.max(width, height));
      if (scale >= 1) return { dataUrl: dataUrl, width: width, height: height, mime: mime || ((dataUrl.match(/^data:([^;]+)/) || [])[1] || 'image/png') };
      var canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(width * scale));
      canvas.height = Math.max(1, Math.round(height * scale));
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      var outMime = mime === 'image/jpeg' || mime === 'image/webp' ? mime : 'image/png';
      return { dataUrl: canvas.toDataURL(outMime, 0.92), width: canvas.width, height: canvas.height, mime: outMime };
    });
  }

  function fileToDataUrl(file) {
    return new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function() { resolve(String(reader.result || '')); };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function addVisualReference(params) {
    var raw = params && (params.dataUrl || params.image || params.url || params.data) ? String(params.dataUrl || params.image || params.url || params.data) : '';
    var mime = params && typeof params.mime === 'string' ? params.mime : '';
    var dataUrl = isImageDataUrl(raw) ? raw : (raw && /^image\//.test(mime) ? 'data:' + mime + ';base64,' + raw.replace(/\s+/g, '') : '');
    if (!isImageDataUrl(dataUrl)) return Promise.resolve({ ok: false, error: 'Missing image data URL' });
    return downscaleDataUrl(dataUrl, mime).then(function(normalized) {
      var ref = cloneVisualRef({
        id: uid('visual'),
        label: params && params.label ? String(params.label) : 'Screenshot ' + (state.visualRefs.length + 1),
        dataUrl: normalized.dataUrl,
        mime: normalized.mime,
        width: normalized.width,
        height: normalized.height,
        source: params && params.source ? String(params.source) : 'import',
        note: params && params.note ? String(params.note) : '',
        createdAt: Date.now()
      });
      state.visualRefs = [ref].concat(state.visualRefs).slice(0, MAX_VISUAL_REFS);
      render();
      schedulePersistBuilderState();
      return { ok: true, ref: visualRefPublic(ref, false) };
    }).catch(function(error) {
      return { ok: false, error: error && error.message ? error.message : String(error) };
    });
  }

  function importVisualFiles(files) {
    var list = Array.prototype.slice.call(files || []).filter(function(file) { return file && /^image\//.test(file.type || ''); });
    if (!list.length) return;
    Promise.all(list.slice(0, MAX_VISUAL_REFS).map(function(file) {
      return fileToDataUrl(file).then(function(dataUrl) {
        return addVisualReference({ dataUrl: dataUrl, mime: file.type || 'image/png', label: file.name || 'Screenshot', source: 'file' });
      });
    })).then(function() { hideError(); render(); });
  }

  function removeVisualRef(id) {
    state.visualRefs = state.visualRefs.filter(function(ref) { return ref.id !== id; });
    render();
    schedulePersistBuilderState();
  }

  function clearVisualReferences() {
    state.visualRefs = [];
    render();
    schedulePersistBuilderState();
    return { ok: true };
  }

  function appendPromptText(text) {
    var input = $('prompt');
    var current = input.value.trim();
    input.value = current ? (current + '\n\n' + text) : text;
    state.lastVisualPrompt = text;
    syncPromptHeight();
    render();
  }

  function applyPromptTemplate(mode) {
    var prompt = buildVisualVerificationPrompt(mode);
    appendPromptText(prompt);
    return prompt;
  }

  function openQaReport() {
    if (!window.contex || !window.contex.chat || typeof window.contex.chat.openSurface !== 'function') {
      showError('Chat surface launcher unavailable for QA evidence.');
      return;
    }
    window.contex.chat.openSurface({ extId: 'qa-workbench', surfaceId: 'qa-report' }).catch(function(error) {
      showError(error && error.message ? error.message : String(error));
    });
  }

  function renderVisualRefs() {
    var root = $('visualRefs');
    if (!root) return;
    var refs = allVisualRefs();
    root.innerHTML = '';
    root.style.display = refs.length ? 'flex' : 'none';
    refs.forEach(function(ref) {
      var card = document.createElement('div');
      card.className = 'visual-ref-card';
      var img = document.createElement('img');
      img.alt = ref.label;
      img.src = ref.dataUrl;
      var label = document.createElement('span');
      label.className = 'visual-ref-label';
      label.textContent = ref.label + (ref.width && ref.height ? ' · ' + ref.width + '×' + ref.height : '');
      card.appendChild(img);
      card.appendChild(label);
      if (String(ref.source || '').indexOf('ctx:') !== 0) {
        var close = document.createElement('button');
        close.type = 'button';
        close.textContent = '×';
        close.onclick = function(event) { event.stopPropagation(); removeVisualRef(ref.id); };
        card.appendChild(close);
      }
      root.appendChild(card);
    });
  }

  function renderWantedChips() {
    var root = $('wantedChips');
    root.innerHTML = '';
    state.wantedRefs.forEach(function(snapshot) {
      var chip = document.createElement('div');
      chip.className = 'wanted-chip';
      chip.innerHTML = '<span>' + escapeHtml(snapshot.label) + '</span>';
      var close = document.createElement('button');
      close.type = 'button';
      close.textContent = '×';
      close.onclick = function(event) {
        event.stopPropagation();
        state.wantedRefs = state.wantedRefs.filter(function(item) { return item.sourceId !== snapshot.sourceId; });
        render();
      };
      chip.appendChild(close);
      root.appendChild(chip);
    });
  }

  function renderGrid() {
    var grid = $('variantGrid');
    var empty = $('emptyState');
    grid.innerHTML = '';
    empty.style.display = state.variants.length ? 'none' : 'flex';
    $('variantCounter').textContent = state.variants.length + ' variant' + (state.variants.length === 1 ? '' : 's');
    if (!state.variants.length) return;

    grid.style.gridTemplateColumns = 'repeat(' + state.variants.length + ', minmax(0, 1fr))';

    state.variants.forEach(function(variant) {
      var card = document.createElement('div');
      card.className = 'variant-card' + (variant.id === state.activeVariantId ? ' active' : '');
      card.onclick = function() { selectVariant(variant.id); };

      var wanted = isVariantWanted(variant.id);

      card.innerHTML = ''
        + '<div class="variant-top">'
        + '  <div class="variant-title">' + escapeHtml(variant.label) + '</div>'
        + '  <div class="variant-actions">'
        + '    <button type="button" class="control-btn" data-action="expand" title="Expand">↗</button>'
        + '    <button type="button" class="control-btn' + (wanted ? ' active' : '') + '" data-action="want" title="Want this variant">★ <span>' + (wanted ? 'Wanted' : 'Want') + '</span></button>'
        + '  </div>'
        + '</div>'
        + '<div class="variant-preview"><iframe sandbox="allow-scripts allow-same-origin" title="' + escapeHtml(variant.label) + '"></iframe></div>';

      card.querySelector('[data-action="expand"]').onclick = function(event) {
        event.stopPropagation();
        openExpandedVariant(variant.id);
      };
      card.querySelector('[data-action="want"]').onclick = function(event) {
        event.stopPropagation();
        toggleWantedRef(variant);
      };
      card.querySelector('iframe').srcdoc = buildSrcdoc(variant.html || '');
      grid.appendChild(card);
    });
  }

  function renderExpandedVariant() {
    var variant = state.variants.find(function(item) { return item.id === state.expandedVariantId; }) || null;
    $('expandTitle').textContent = variant ? variant.label : 'Variant';
    $('expandSubtitle').textContent = variant ? truncate(variant.prompt || 'Expanded preview', 180) : 'Expanded preview';
    $('expandPreview').srcdoc = variant ? buildSrcdoc(variant.html || '') : '';
  }

  function renderContextSummary() {
    var count = 0;
    Object.keys(state.peerContext).forEach(function(peerId) {
      count += Object.keys(state.peerContext[peerId] || {}).length;
    });

    if (allVisualRefs().length > 0) {
      $('peerContextSummary').textContent = allVisualRefs().length + ' visual reference' + (allVisualRefs().length === 1 ? '' : 's') + ' will be sent as image input.';
      return;
    }

    if (state.wantedRefs.length > 0) {
      $('peerContextSummary').textContent = 'Wanted chips will be used as reference context for the next generation.';
      return;
    }

    if (count > 0) {
      $('peerContextSummary').textContent = count + ' context item' + (count === 1 ? '' : 's') + ' from other chat surfaces will be included.';
      return;
    }

    $('peerContextSummary').textContent = '';
  }

  function renderHistoryControls() {
    var select = $('historySelect');
    if (!select) return;
    select.innerHTML = '';
    var history = sanitizeHistory(state.history);
    state.history = history;
    if (!history.length) {
      var emptyOption = document.createElement('option');
      emptyOption.value = '';
      emptyOption.textContent = 'No build history';
      select.appendChild(emptyOption);
      select.disabled = true;
      return;
    }
    select.disabled = false;
    var placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = 'Build history';
    select.appendChild(placeholder);
    history.forEach(function(item) {
      var option = document.createElement('option');
      option.value = item.id;
      option.textContent = item.id === state.currentBuildId ? 'Current: ' + item.title : item.title;
      select.appendChild(option);
    });
    select.value = state.currentBuildId || '';
  }

  function render() {
    syncCurrentBuildToHistory();
    renderWantedChips();
    renderVisualRefs();
    renderGrid();
    renderHistoryControls();
    renderContextSummary();
    renderExpandedVariant();
    syncPromptHeight();
    publishBuilderContext(state.generating ? 'generating' : (state.variants.length ? 'ready' : 'empty'), null);
    schedulePersistBuilderState();
  }

  function openSettings() {
    $('settApiKey').value = state.config.apiKey;
    $('settModel').value = state.config.model;
    $('settBaseUrl').value = state.config.baseUrl;
    $('settingsOverlay').style.display = 'flex';
  }

  function closeSettings() {
    $('settingsOverlay').style.display = 'none';
  }

  function saveSettingsFromUI() {
    state.config.apiKey = $('settApiKey').value.trim();
    state.config.model = $('settModel').value.trim() || DEFAULTS.model;
    state.config.baseUrl = $('settBaseUrl').value.trim() || DEFAULTS.baseUrl;
    saveConfig(state.config);
    closeSettings();
    hideError();
    setGenerating(false);
    render();
  }

  function initContex() {
    if (!window.contex || state.contexReady) return;
    state.contexReady = true;
    hydratePersistedState();

    if (window.contex.context) {
      if (typeof window.contex.context.getAll === 'function') {
        window.contex.context.getAll('ctx:').then(function(entries) {
          state.localContext = {};
          (Array.isArray(entries) ? entries : []).forEach(function(entry) {
            if (entry && typeof entry.key === 'string') state.localContext[entry.key] = entry.value;
          });
          maybeApplyQaHandoffPrompt();
          render();
        }).catch(function() {});
      }
      if (typeof window.contex.context.onChanged === 'function') {
        window.contex.context.onChanged(function(data) {
          if (!data || !data.key) return;
          state.localContext[data.key] = data.value;
          maybeApplyQaHandoffPrompt();
          render();
        });
      }
      window.contex.context.onPeerContextChanged(function(data) {
        if (!data.peerId || !data.key) return;
        state.peerContext[data.peerId] = state.peerContext[data.peerId] || {};
        state.peerContext[data.peerId][data.key] = data.value;
        maybeApplyQaHandoffPrompt();
        render();
      });
    }

    if (window.contex.actions) {
      window.contex.actions.register('generate', 'Generate Builder variants from a prompt', function(params) {
        var prompt = params && (params.prompt || params.description) ? String(params.prompt || params.description) : '';
        if (!prompt) return { ok: false, error: 'Missing prompt' };
        $('prompt').value = prompt;
        if (params && params.variantCount) {
          var nextCount = Number(params.variantCount);
          if (nextCount >= 1 && nextCount <= 3) setVariantCount(nextCount);
        }
        setTimeout(generateVariants, 50);
        return { ok: true, status: 'generating' };
      });

      window.contex.actions.register('setHtml', 'Set the current Builder HTML directly', function(params) {
        var html = params && (params.html || params.content) ? String(params.html || params.content) : '';
        var cleanHtml = extractHtmlOnly(html);
        if (!cleanHtml) return { ok: false, error: 'Missing html' };
        state.currentBuildId = uid('build');
        state.variants = [{ id: uid('variant'), label: 'Variant 1', prompt: $('prompt').value.trim(), html: cleanHtml, status: 'ready' }];
        state.activeVariantId = state.variants[0].id;
        syncCurrentBuildToHistory();
        render();
        persistBuilderState();
        return { ok: true };
      });

      window.contex.actions.register('getHtml', 'Get the selected Builder HTML', function() {
        var selected = activeVariant();
        return {
          html: selected ? selected.html : '',
          variantCount: state.variants.length,
          status: state.generating ? 'generating' : (selected ? 'ready' : 'empty')
        };
      });

      window.contex.actions.register('getStatus', 'Get Builder generation status', function() {
        return {
          status: state.generating ? 'generating' : (state.variants.length ? 'ready' : 'empty'),
          variantCount: state.variants.length,
          activeVariantId: state.activeVariantId,
          currentBuildId: state.currentBuildId,
          historyCount: state.history.length
        };
      });

      window.contex.actions.register('setPrompt', 'Set the current Builder prompt', function(params) {
        $('prompt').value = params && params.prompt ? String(params.prompt) : '';
        syncPromptHeight();
        schedulePersistBuilderState();
        return { ok: true };
      });

      window.contex.actions.register('addVisualReference', 'Attach a screenshot or sketch reference', function(params) {
        return addVisualReference(params || {});
      });

      window.contex.actions.register('clearVisualReferences', 'Remove imported screenshot/sketch references', function() {
        return clearVisualReferences();
      });

      window.contex.actions.register('buildVisualVerificationPrompt', 'Create a screenshot/QA-aware prompt', function(params) {
        var mode = params && params.mode ? String(params.mode) : 'visual-verify';
        var prompt = buildVisualVerificationPrompt(mode);
        state.lastVisualPrompt = prompt;
        render();
        return { ok: true, prompt: prompt, visualRefCount: allVisualRefs().length };
      });

      window.contex.actions.register('setSettings', 'Update Builder settings', function(params) {
        if (params.model) state.config.model = String(params.model);
        if (params.baseUrl) state.config.baseUrl = String(params.baseUrl);
        if (params.apiKey) state.config.apiKey = String(params.apiKey);
        saveConfig(state.config);
        render();
        return { ok: true, model: state.config.model };
      });
    }

    if (window.contex.surface) {
      window.contex.surface.onRequestFlush(function() {
        publishBuilderContext(state.generating ? 'generating' : (state.variants.length ? 'ready' : 'empty'), null);
      });

      window.contex.surface.onClear(function() {
        if (state.abortCtrl) state.abortCtrl.abort();
        state.abortCtrl = null;
        state.variants = [];
        state.activeVariantId = null;
        state.wantedRefs = [];
        state.visualRefs = [];
        state.expandedVariantId = null;
        state.currentBuildId = null;
        state.generating = false;
        state.peerContext = {};
        state.localContext = {};
        $('prompt').value = '';
        hideError();
        setGenerating(false);
        closeExpandedVariant();
        render();
      });
    }

    render();
  }

  function bootstrap() {
    Array.prototype.forEach.call(document.querySelectorAll('#variantCountControl .segment-btn'), function(button) {
      button.onclick = function() { setVariantCount(Number(button.getAttribute('data-count'))); };
    });
    $('historySelect').onchange = function() {
      if (this.value) restoreHistoryItem(this.value);
    };

    state.loadingPersistedState = true;
    applyPersistedState(loadLocalState());
    state.loadingPersistedState = false;

    setVariantCount(state.variantCount);
    $('generateBtn').onclick = generateVariants;
    $('screenshotBtn').onclick = function() { $('screenshotInput').click(); };
    $('screenshotInput').onchange = function(event) { importVisualFiles(event.target.files); event.target.value = ''; };
    $('qaHandoffBtn').onclick = openQaReport;
    Array.prototype.forEach.call(document.querySelectorAll('[data-template]'), function(button) {
      button.onclick = function() { applyPromptTemplate(button.getAttribute('data-template') || 'visual-verify'); };
    });
    var surfaceEl = document.querySelector('.surface');
    if (surfaceEl) {
      ['dragenter', 'dragover'].forEach(function(type) {
        surfaceEl.addEventListener(type, function(event) {
          var files = event.dataTransfer && Array.prototype.slice.call(event.dataTransfer.files || []);
          var hasImage = files && files.some(function(file) { return /^image\//.test(file.type || ''); });
          if (!hasImage && event.dataTransfer && Array.prototype.slice.call(event.dataTransfer.items || []).some(function(item) { return item.kind === 'file' && /^image\//.test(item.type || ''); })) hasImage = true;
          if (!hasImage) return;
          event.preventDefault();
          event.dataTransfer.dropEffect = 'copy';
          surfaceEl.classList.add('design-drop-active');
        });
      });
      ['dragleave', 'drop'].forEach(function(type) {
        surfaceEl.addEventListener(type, function(event) {
          if (type === 'dragleave' && surfaceEl.contains(event.relatedTarget)) return;
          surfaceEl.classList.remove('design-drop-active');
        });
      });
      surfaceEl.addEventListener('drop', function(event) {
        var files = event.dataTransfer && event.dataTransfer.files;
        if (!files || !files.length) return;
        event.preventDefault();
        importVisualFiles(files);
      });
    }
    window.addEventListener('paste', function(event) {
      var items = Array.prototype.slice.call((event.clipboardData && event.clipboardData.items) || []);
      var files = items.filter(function(item) { return item.kind === 'file' && /^image\//.test(item.type || ''); }).map(function(item) { return item.getAsFile(); }).filter(Boolean);
      if (!files.length) return;
      event.preventDefault();
      importVisualFiles(files);
    });
    $('settingsBtn').onclick = openSettings;
    $('settingsCancelBtn').onclick = closeSettings;
    $('settingsSaveBtn').onclick = saveSettingsFromUI;
    $('settingsOverlay').onclick = function(event) { if (event.target === $('settingsOverlay')) closeSettings(); };
    $('expandOverlay').onclick = function(event) { if (event.target === $('expandOverlay')) closeExpandedVariant(); };
    $('expandCloseBtn').onclick = closeExpandedVariant;
    $('prompt').addEventListener('input', function() {
      syncPromptHeight();
      schedulePersistBuilderState();
    });
    $('prompt').addEventListener('keydown', function(event) {
      if (event.key === 'Enter' && (event.metaKey || event.ctrlKey)) {
        event.preventDefault();
        generateVariants();
      }
    });
    window.addEventListener('pagehide', persistBuilderState);
    window.addEventListener('beforeunload', persistBuilderState);

    if (!state.config.apiKey) showError('Set your API key in Builder settings to enable generation.');
    setGenerating(false);
    syncPromptHeight();
    render();

    var initDone = false;
    function tryInitContex() {
      if (initDone || !window.contex) return;
      initDone = true;
      initContex();
    }

    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'contex-bridge-ready') tryInitContex();
    });

    tryInitContex();
    setTimeout(tryInitContex, 0);
    setTimeout(tryInitContex, 50);
    setTimeout(tryInitContex, 150);
  }

  bootstrap();
</script>
</body>
