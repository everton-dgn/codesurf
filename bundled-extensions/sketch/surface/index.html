<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Sketch</title>
  <style>
    html,body { height: 100%; margin: 0; padding: 0; background: transparent; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
      font-family: var(--ct-font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      color: var(--ct-text, #111);
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-bottom: 1px solid var(--ct-border, rgba(0,0,0,.12));
      flex-wrap: wrap;
    }
    .toolbar button {
      background: transparent;
      border: 1px solid transparent;
      color: var(--ct-muted, #666);
      border-radius: 6px;
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      font-size: 13px;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .toolbar button:hover {
      background: var(--ct-hover, rgba(0,0,0,.06));
      color: var(--ct-text, #111);
    }
    .toolbar button[aria-pressed="true"] {
      background: var(--ct-accent-s, rgba(79,70,229,.12));
      color: var(--ct-accent, #4f46e5);
      border-color: var(--ct-accent, #4f46e5);
    }
    .toolbar .sep {
      width: 1px;
      height: 16px;
      background: var(--ct-border, rgba(0,0,0,.12));
      margin: 0 4px;
    }
    .toolbar .thickness {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0 4px;
    }
    .toolbar .thickness input[type=range] {
      width: 64px;
      padding: 0;
      border: none;
      background: transparent;
    }
    .toolbar .swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--ct-border, rgba(0,0,0,.18));
      cursor: pointer;
      padding: 0;
    }
    .toolbar .swatch[aria-pressed="true"] {
      box-shadow: 0 0 0 2px var(--ct-accent, #4f46e5);
      border-color: transparent;
    }
    .canvas-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: var(--ct-bg, #fff);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }
    .status {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 10px;
      color: var(--ct-dim, #999);
      font-family: var(--ct-font-mono, ui-monospace, SFMono-Regular, monospace);
      pointer-events: none;
      user-select: none;
    }
    .drop-hint {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--ct-accent-s, rgba(79,70,229,.10));
      border: 2px dashed var(--ct-accent, #4f46e5);
      border-radius: 6px;
      color: var(--ct-accent, #4f46e5);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      pointer-events: none;
      user-select: none;
    }
    .canvas-wrap.is-dragover .drop-hint { display: flex; }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <button data-tool="pen" aria-pressed="true" title="Pen">&#9998;</button>
    <button data-tool="rect" title="Rectangle">&#9645;</button>
    <button data-tool="ellipse" title="Ellipse">&#9675;</button>
    <button data-tool="line" title="Line">&#9585;</button>
    <button data-tool="arrow" title="Arrow">&#8594;</button>
    <button data-tool="eraser" title="Eraser">&#9866;</button>
    <button data-tool="select" title="Select / Move">&#9974;</button>

    <div class="sep"></div>

    <div class="thickness" title="Stroke thickness">
      <span style="font-size:10px;color:var(--ct-dim,#999)">px</span>
      <input type="range" id="thickness" min="1" max="24" value="3" />
    </div>

    <div class="sep"></div>

    <button class="swatch" data-color="#111111" aria-pressed="true" style="background:#111"></button>
    <button class="swatch" data-color="#dc2626" style="background:#dc2626"></button>
    <button class="swatch" data-color="#2563eb" style="background:#2563eb"></button>
    <button class="swatch" data-color="#16a34a" style="background:#16a34a"></button>
    <button class="swatch" data-color="#f59e0b" style="background:#f59e0b"></button>
    <button class="swatch" data-color="#7c3aed" style="background:#7c3aed"></button>
    <button class="swatch" data-color="#ffffff" style="background:#fff;border-color:var(--ct-border,rgba(0,0,0,.25))"></button>

    <div class="sep"></div>

    <button id="undo" title="Undo">&#8630;</button>
    <button id="redo" title="Redo">&#8631;</button>
    <button id="delete" title="Delete selection">&#128465;</button>
    <button id="clear" title="Clear all">&#10060;</button>

    <div class="sep"></div>

    <button id="importImage" title="Import screenshot/image">&#8682;</button>
    <button id="sendBuilder" title="Open Builder with this sketch as visual context">&#10022;</button>
    <input id="imageInput" type="file" accept="image/*" multiple hidden />
  </div>
  <div class="canvas-wrap" id="wrap">
    <canvas id="c"></canvas>
    <div class="status" id="status"></div>
    <div class="drop-hint">Drop screenshot or image to insert</div>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById('c')
      const ctx = canvas.getContext('2d')
      const wrap = canvas.parentElement
      const toolbar = document.getElementById('toolbar')
      const thicknessEl = document.getElementById('thickness')
      const statusEl = document.getElementById('status')
      const imageInput = document.getElementById('imageInput')

      // ── State ────────────────────────────────────────────────────────────
      let tool = 'pen'
      let color = '#111111'
      let thickness = 3
      /** @type {Array<Shape>} */
      let shapes = []
      /** @type {Array<Array<Shape>>} */
      const undoStack = []
      const redoStack = []
      /** Temp live shape while dragging. */
      let drafting = null
      /** Selected shape index. */
      let selectedIdx = -1
      /** Drag offset for moving. */
      let dragOffset = null
      /** Which resize handle is being dragged ('nw','n','ne','e','se','s','sw','w') or null. */
      let resizeHandle = null
      /** Snapshot of image rect at resize start: { x, y, w, h }. */
      let resizeStart = null
      /** Drop point (canvas coords) where the resize began. */
      let resizeAnchor = null

      // Shape = { type, color, width, points?, x?,y?,w?,h?,x2?,y2?, src? }
      // points: array of {x,y}
      // 'image' shape: { type:'image', x, y, w, h, src } — src is a data URL

      /** Cache of loaded HTMLImageElements keyed by data URL src. */
      const imageCache = new Map()
      /** Load a data URL into an HTMLImageElement, returning a cached promise. */
      function loadImage(src) {
        const existing = imageCache.get(src)
        if (existing && existing.complete && existing.naturalWidth > 0) return Promise.resolve(existing)
        return new Promise((resolve, reject) => {
          const img = new Image()
          img.onload = () => { imageCache.set(src, img); resolve(img); render() }
          img.onerror = reject
          img.src = src
          imageCache.set(src, img)
        })
      }

      // ── Canvas sizing ────────────────────────────────────────────────────
      let dpr = window.devicePixelRatio || 1
      function resize() {
        dpr = window.devicePixelRatio || 1
        const rect = wrap.getBoundingClientRect()
        canvas.width = Math.max(1, Math.floor(rect.width * dpr))
        canvas.height = Math.max(1, Math.floor(rect.height * dpr))
        canvas.style.width = rect.width + 'px'
        canvas.style.height = rect.height + 'px'
        render()
      }
      new ResizeObserver(resize).observe(wrap)
      resize()

      // ── Render ───────────────────────────────────────────────────────────
      function setStroke(s) {
        ctx.strokeStyle = s.color
        ctx.fillStyle = s.color
        ctx.lineWidth = (s.width || 2) * dpr
        ctx.lineJoin = 'round'
        ctx.lineCap = 'round'
      }
      function drawShape(s) {
        setStroke(s)
        ctx.beginPath()
        if (s.type === 'pen' || s.type === 'eraser') {
          if (!s.points || s.points.length < 1) return
          if (s.type === 'eraser') ctx.globalCompositeOperation = 'destination-out'
          ctx.moveTo(s.points[0].x * dpr, s.points[0].y * dpr)
          for (let i = 1; i < s.points.length; i++) {
            ctx.lineTo(s.points[i].x * dpr, s.points[i].y * dpr)
          }
          if (s.points.length === 1) {
            // Single tap — draw a dot
            ctx.arc(s.points[0].x * dpr, s.points[0].y * dpr, Math.max(1, s.width/2) * dpr, 0, Math.PI*2)
            ctx.fill()
          }
          ctx.stroke()
          ctx.globalCompositeOperation = 'source-over'
        } else if (s.type === 'rect') {
          ctx.rect(s.x * dpr, s.y * dpr, s.w * dpr, s.h * dpr)
          ctx.stroke()
        } else if (s.type === 'ellipse') {
          const cx = (s.x + s.w/2) * dpr
          const cy = (s.y + s.h/2) * dpr
          ctx.ellipse(cx, cy, Math.abs(s.w/2) * dpr, Math.abs(s.h/2) * dpr, 0, 0, Math.PI*2)
          ctx.stroke()
        } else if (s.type === 'line') {
          ctx.moveTo(s.x * dpr, s.y * dpr)
          ctx.lineTo(s.x2 * dpr, s.y2 * dpr)
          ctx.stroke()
        } else if (s.type === 'arrow') {
          const x1 = s.x * dpr, y1 = s.y * dpr, x2 = s.x2 * dpr, y2 = s.y2 * dpr
          ctx.moveTo(x1, y1)
          ctx.lineTo(x2, y2)
          ctx.stroke()
          const angle = Math.atan2(y2 - y1, x2 - x1)
          const head = Math.max(8, s.width * 3) * dpr
          ctx.beginPath()
          ctx.moveTo(x2, y2)
          ctx.lineTo(x2 - head * Math.cos(angle - Math.PI/6), y2 - head * Math.sin(angle - Math.PI/6))
          ctx.lineTo(x2 - head * Math.cos(angle + Math.PI/6), y2 - head * Math.sin(angle + Math.PI/6))
          ctx.closePath()
          ctx.fill()
        } else if (s.type === 'image') {
          const img = imageCache.get(s.src)
          if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, s.x * dpr, s.y * dpr, s.w * dpr, s.h * dpr)
          } else {
            // placeholder while loading
            ctx.strokeStyle = 'rgba(79,70,229,0.5)'
            ctx.setLineDash([4,4])
            ctx.lineWidth = 1 * dpr
            ctx.strokeRect(s.x * dpr, s.y * dpr, s.w * dpr, s.h * dpr)
            ctx.setLineDash([])
            if (s.src && !imageCache.has(s.src)) loadImage(s.src).catch(() => {})
          }
        }
      }
      /** Handle hit-box size (in canvas CSS pixels). */
      const HANDLE_SIZE = 10
      const HANDLE_NAMES = ['nw','n','ne','e','se','s','sw','w']
      const HANDLE_CURSORS = { nw: 'nwse-resize', se: 'nwse-resize', ne: 'nesw-resize', sw: 'nesw-resize', n: 'ns-resize', s: 'ns-resize', e: 'ew-resize', w: 'ew-resize' }

      /** Returns the (x,y) anchor for a given handle of rect b. */
      function handlePoint(b, name) {
        const cx = b.x + b.w / 2, cy = b.y + b.h / 2
        switch (name) {
          case 'nw': return { x: b.x, y: b.y }
          case 'n':  return { x: cx, y: b.y }
          case 'ne': return { x: b.x + b.w, y: b.y }
          case 'e':  return { x: b.x + b.w, y: cy }
          case 'se': return { x: b.x + b.w, y: b.y + b.h }
          case 's':  return { x: cx, y: b.y + b.h }
          case 'sw': return { x: b.x, y: b.y + b.h }
          case 'w':  return { x: b.x, y: cy }
        }
        return { x: 0, y: 0 }
      }

      /** Hit-test a point against the 8 handles of bounds b. Returns handle name or null. */
      function hitHandle(b, x, y) {
        const r = HANDLE_SIZE / 2 + 2
        for (const name of HANDLE_NAMES) {
          const p = handlePoint(b, name)
          if (x >= p.x - r && x <= p.x + r && y >= p.y - r && y <= p.y + r) return name
        }
        return null
      }

      function drawHandles(b) {
        const size = HANDLE_SIZE * dpr
        ctx.save()
        ctx.lineWidth = 1 * dpr
        ctx.strokeStyle = 'rgba(79,70,229,0.95)'
        ctx.fillStyle = '#ffffff'
        for (const name of HANDLE_NAMES) {
          const p = handlePoint(b, name)
          const hx = p.x * dpr - size / 2
          const hy = p.y * dpr - size / 2
          ctx.fillRect(hx, hy, size, size)
          ctx.strokeRect(hx, hy, size, size)
        }
        ctx.restore()
      }

      function render() {
        ctx.save()
        ctx.setTransform(1,0,0,1,0,0)
        ctx.clearRect(0,0,canvas.width, canvas.height)
        for (const s of shapes) drawShape(s)
        if (drafting) drawShape(drafting)
        if (selectedIdx >= 0 && selectedIdx < shapes.length) {
          const sel = shapes[selectedIdx]
          const b = boundsOf(sel)
          if (b) {
            ctx.strokeStyle = 'rgba(79,70,229,0.9)'
            ctx.setLineDash([6,4])
            ctx.lineWidth = 1 * dpr
            ctx.strokeRect((b.x - 4) * dpr, (b.y - 4) * dpr, (b.w + 8) * dpr, (b.h + 8) * dpr)
            ctx.setLineDash([])
            // Resize handles — currently image-only. Easy to extend to rect/ellipse later.
            if (sel.type === 'image') drawHandles(b)
          }
        }
        ctx.restore()
        flushStatus()
        notifyPayload()
      }

      function boundsOf(s) {
        if (s.type === 'pen' || s.type === 'eraser') {
          if (!s.points || s.points.length === 0) return null
          let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity
          for (const p of s.points) {
            if (p.x < minX) minX = p.x
            if (p.y < minY) minY = p.y
            if (p.x > maxX) maxX = p.x
            if (p.y > maxY) maxY = p.y
          }
          return { x: minX, y: minY, w: maxX - minX, h: maxY - minY }
        }
        if (s.type === 'rect' || s.type === 'ellipse' || s.type === 'image') {
          const x = Math.min(s.x, s.x + s.w)
          const y = Math.min(s.y, s.y + s.h)
          return { x, y, w: Math.abs(s.w), h: Math.abs(s.h) }
        }
        if (s.type === 'line' || s.type === 'arrow') {
          const x = Math.min(s.x, s.x2)
          const y = Math.min(s.y, s.y2)
          return { x, y, w: Math.abs(s.x2 - s.x), h: Math.abs(s.y2 - s.y) }
        }
        return null
      }

      function hitTest(x, y) {
        // Top-down (last drawn = on top)
        for (let i = shapes.length - 1; i >= 0; i--) {
          const b = boundsOf(shapes[i])
          if (!b) continue
          if (x >= b.x - 6 && x <= b.x + b.w + 6 && y >= b.y - 6 && y <= b.y + b.h + 6) {
            return i
          }
        }
        return -1
      }

      function translateShape(s, dx, dy) {
        if (s.type === 'pen' || s.type === 'eraser') {
          s.points = s.points.map(p => ({ x: p.x + dx, y: p.y + dy }))
        } else if (s.type === 'rect' || s.type === 'ellipse' || s.type === 'image') {
          s.x += dx; s.y += dy
        } else if (s.type === 'line' || s.type === 'arrow') {
          s.x += dx; s.y += dy; s.x2 += dx; s.y2 += dy
        }
      }

      // ── Input ────────────────────────────────────────────────────────────
      let drawing = false
      let startPt = null

      function pointFromEvent(e) {
        const rect = canvas.getBoundingClientRect()
        return { x: e.clientX - rect.left, y: e.clientY - rect.top }
      }

      canvas.addEventListener('pointerdown', (e) => {
        canvas.setPointerCapture(e.pointerId)
        const p = pointFromEvent(e)
        if (tool === 'select') {
          // 1. If an image is already selected, test its resize handles first
          //    so you can grab a corner without being stolen by translate.
          if (selectedIdx >= 0 && selectedIdx < shapes.length && shapes[selectedIdx].type === 'image') {
            const sel = shapes[selectedIdx]
            const b = boundsOf(sel)
            const h = b ? hitHandle(b, p.x, p.y) : null
            if (h) {
              pushUndo()
              resizeHandle = h
              resizeStart = { x: sel.x, y: sel.y, w: sel.w, h: sel.h }
              resizeAnchor = p
              canvas.style.cursor = HANDLE_CURSORS[h]
              return
            }
          }
          // 2. Otherwise standard hit-test + translate.
          const idx = hitTest(p.x, p.y)
          selectedIdx = idx
          if (idx >= 0) {
            dragOffset = { x: p.x, y: p.y }
          } else {
            dragOffset = null
          }
          render()
          return
        }
        drawing = true
        startPt = p
        pushUndo()
        if (tool === 'pen' || tool === 'eraser') {
          drafting = { type: tool, color, width: thickness, points: [p] }
        } else {
          drafting = { type: tool, color, width: thickness, x: p.x, y: p.y, x2: p.x, y2: p.y, w: 0, h: 0 }
        }
        render()
      })

      canvas.addEventListener('pointermove', (e) => {
        const p = pointFromEvent(e)
        // Live resize on a grabbed handle.
        if (tool === 'select' && resizeHandle && selectedIdx >= 0 && resizeStart && resizeAnchor) {
          const dx = p.x - resizeAnchor.x
          const dy = p.y - resizeAnchor.y
          const MIN = 12
          let nx = resizeStart.x, ny = resizeStart.y, nw = resizeStart.w, nh = resizeStart.h
          if (resizeHandle.includes('w')) { nx = resizeStart.x + dx; nw = resizeStart.w - dx }
          if (resizeHandle.includes('e')) { nw = resizeStart.w + dx }
          if (resizeHandle.includes('n')) { ny = resizeStart.y + dy; nh = resizeStart.h - dy }
          if (resizeHandle.includes('s')) { nh = resizeStart.h + dy }
          // Preserve aspect ratio when Shift is held (for corner handles).
          const isCorner = resizeHandle.length === 2
          if (isCorner && e.shiftKey) {
            const aspect = resizeStart.w / Math.max(1, resizeStart.h)
            // Pick dominant axis by displacement magnitude.
            if (Math.abs(dx) > Math.abs(dy)) {
              const targetH = Math.abs(nw) / aspect
              nh = nh < 0 ? -targetH : targetH
              if (resizeHandle.includes('n')) ny = resizeStart.y + (resizeStart.h - nh)
            } else {
              const targetW = Math.abs(nh) * aspect
              nw = nw < 0 ? -targetW : targetW
              if (resizeHandle.includes('w')) nx = resizeStart.x + (resizeStart.w - nw)
            }
          }
          // Enforce minimum size (without flipping).
          if (nw < MIN) { if (resizeHandle.includes('w')) nx = resizeStart.x + resizeStart.w - MIN; nw = MIN }
          if (nh < MIN) { if (resizeHandle.includes('n')) ny = resizeStart.y + resizeStart.h - MIN; nh = MIN }
          const sel = shapes[selectedIdx]
          sel.x = Math.round(nx); sel.y = Math.round(ny); sel.w = Math.round(nw); sel.h = Math.round(nh)
          render()
          return
        }
        if (tool === 'select' && dragOffset && selectedIdx >= 0) {
          const dx = p.x - dragOffset.x
          const dy = p.y - dragOffset.y
          dragOffset = p
          translateShape(shapes[selectedIdx], dx, dy)
          render()
          return
        }
        // Hover cursor feedback over image handles (select tool, no drag in progress).
        if (tool === 'select' && !drawing && selectedIdx >= 0 && selectedIdx < shapes.length) {
          const sel = shapes[selectedIdx]
          if (sel.type === 'image') {
            const b = boundsOf(sel)
            const h = b ? hitHandle(b, p.x, p.y) : null
            canvas.style.cursor = h ? HANDLE_CURSORS[h] : 'default'
          }
        }
        if (!drawing || !drafting) return
        if (drafting.type === 'pen' || drafting.type === 'eraser') {
          drafting.points.push(p)
        } else if (drafting.type === 'rect' || drafting.type === 'ellipse') {
          drafting.w = p.x - startPt.x
          drafting.h = p.y - startPt.y
        } else {
          drafting.x2 = p.x
          drafting.y2 = p.y
        }
        render()
      })

      function endDraw() {
        if (tool === 'select') {
          dragOffset = null
          if (resizeHandle) {
            resizeHandle = null
            resizeStart = null
            resizeAnchor = null
            canvas.style.cursor = 'default'
            render()
          }
          return
        }
        if (!drawing) return
        drawing = false
        if (drafting) {
          // Commit if it has any footprint
          const b = boundsOf(drafting)
          if (b && (b.w > 0 || b.h > 0 || (drafting.points && drafting.points.length > 0))) {
            shapes.push(drafting)
          }
          drafting = null
          render()
        }
      }
      canvas.addEventListener('pointerup', endDraw)
      canvas.addEventListener('pointercancel', endDraw)
      canvas.addEventListener('pointerleave', endDraw)

      function clearSketch() {
        pushUndo()
        shapes = []
        selectedIdx = -1
        render()
      }

      function openBuilderWithSketch() {
        notifyPayload()
        if (!window.contex || !window.contex.chat || typeof window.contex.chat.openSurface !== 'function') return
        window.contex.chat.openSurface({ extId: 'builder', surfaceId: 'builder' }).catch(() => {})
      }

      // ── Toolbar ──────────────────────────────────────────────────────────
      toolbar.addEventListener('click', (e) => {
        const btn = e.target.closest('button')
        if (!btn) return
        if (btn.dataset.tool) {
          tool = btn.dataset.tool
          for (const b of toolbar.querySelectorAll('button[data-tool]')) {
            b.setAttribute('aria-pressed', String(b === btn))
          }
          canvas.style.cursor = tool === 'select' ? 'default' : (tool === 'eraser' ? 'cell' : 'crosshair')
          return
        }
        if (btn.dataset.color) {
          color = btn.dataset.color
          for (const b of toolbar.querySelectorAll('.swatch')) {
            b.setAttribute('aria-pressed', String(b === btn))
          }
          return
        }
        if (btn.id === 'undo') { doUndo(); return }
        if (btn.id === 'redo') { doRedo(); return }
        if (btn.id === 'delete') {
          if (selectedIdx >= 0) {
            pushUndo()
            shapes.splice(selectedIdx, 1)
            selectedIdx = -1
            render()
          }
          return
        }
        if (btn.id === 'clear') { clearSketch(); return }
        if (btn.id === 'importImage') { imageInput.click(); return }
        if (btn.id === 'sendBuilder') { openBuilderWithSketch(); return }
      })

      thicknessEl.addEventListener('input', () => {
        thickness = parseInt(thicknessEl.value, 10) || 2
      })

      imageInput.addEventListener('change', async (event) => {
        const files = Array.from(event.target.files || []).filter(f => /^image\//.test(f.type))
        for (const file of files) {
          try {
            const dataUrl = await fileToDataUrl(file)
            insertImageFromDataUrl(dataUrl, null)
          } catch (_) { /* ignore */ }
        }
        imageInput.value = ''
      })

      function pushUndo() {
        undoStack.push(JSON.parse(JSON.stringify(shapes)))
        if (undoStack.length > 50) undoStack.shift()
        redoStack.length = 0
      }
      function doUndo() {
        if (undoStack.length === 0) return
        redoStack.push(JSON.parse(JSON.stringify(shapes)))
        shapes = undoStack.pop()
        selectedIdx = -1
        render()
      }
      function doRedo() {
        if (redoStack.length === 0) return
        undoStack.push(JSON.parse(JSON.stringify(shapes)))
        shapes = redoStack.pop()
        selectedIdx = -1
        render()
      }

      window.addEventListener('keydown', (e) => {
        const isMod = e.metaKey || e.ctrlKey
        if (isMod && e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); doUndo() }
        else if (isMod && (e.key.toLowerCase() === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'))) { e.preventDefault(); doRedo() }
        else if ((e.key === 'Delete' || e.key === 'Backspace') && selectedIdx >= 0) {
          e.preventDefault()
          pushUndo()
          shapes.splice(selectedIdx, 1)
          selectedIdx = -1
          render()
        }
      })

      // ── Drag & Drop + Paste (image insertion) ───────────────────────────
      // Accept image File drops anywhere over the canvas, and Cmd/Ctrl+V
      // paste when the surface has focus. Dropped/pasted images are added
      // as a movable 'image' shape, centered on the drop point (or the
      // canvas center for paste), sized to fit within the visible area.
      function insertImageFromDataUrl(dataUrl, atPoint) {
        loadImage(dataUrl).then((img) => {
          const rect = wrap.getBoundingClientRect()
          const maxW = rect.width * 0.9
          const maxH = rect.height * 0.9
          let w = img.naturalWidth
          let h = img.naturalHeight
          if (w > maxW || h > maxH) {
            const k = Math.min(maxW / w, maxH / h)
            w = Math.max(1, Math.round(w * k))
            h = Math.max(1, Math.round(h * k))
          }
          const cx = atPoint ? atPoint.x : rect.width / 2
          const cy = atPoint ? atPoint.y : rect.height / 2
          pushUndo()
          shapes.push({ type: 'image', x: Math.round(cx - w/2), y: Math.round(cy - h/2), w, h, src: dataUrl, color: '#000', width: 1 })
          // Auto-switch to select so user can reposition immediately.
          tool = 'select'
          selectedIdx = shapes.length - 1
          for (const b of toolbar.querySelectorAll('button[data-tool]')) {
            b.setAttribute('aria-pressed', String(b.dataset.tool === 'select'))
          }
          canvas.style.cursor = 'default'
          render()
        }).catch(() => {})
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader()
          reader.onload = () => resolve(String(reader.result))
          reader.onerror = reject
          reader.readAsDataURL(file)
        })
      }

      ;['dragenter','dragover'].forEach(ev => wrap.addEventListener(ev, (e) => {
        if (!e.dataTransfer) return
        const hasFiles = Array.from(e.dataTransfer.items || []).some(i => i.kind === 'file')
        const hasUriList = Array.from(e.dataTransfer.types || []).some(t => t === 'text/uri-list' || t === 'text/plain')
        if (hasFiles || hasUriList) {
          e.preventDefault()
          e.dataTransfer.dropEffect = 'copy'
          wrap.classList.add('is-dragover')
        }
      }))
      ;['dragleave','drop'].forEach(ev => wrap.addEventListener(ev, (e) => {
        if (ev === 'dragleave' && e.target !== wrap) return
        wrap.classList.remove('is-dragover')
      }))
      wrap.addEventListener('drop', async (e) => {
        e.preventDefault()
        const rect = wrap.getBoundingClientRect()
        const dropPoint = { x: e.clientX - rect.left, y: e.clientY - rect.top }
        const files = Array.from(e.dataTransfer?.files || []).filter(f => /^image\//.test(f.type))
        if (files.length > 0) {
          for (const f of files) {
            try {
              const url = await fileToDataUrl(f)
              insertImageFromDataUrl(url, dropPoint)
            } catch (_) { /* ignore */ }
          }
          return
        }
        // Fallback: data URL in plain text, or remote URL (best effort fetch).
        const text = e.dataTransfer?.getData('text/uri-list') || e.dataTransfer?.getData('text/plain')
        if (text) {
          const url = text.trim().split(/\r?\n/).find(Boolean)
          if (!url) return
          if (url.startsWith('data:image/')) {
            insertImageFromDataUrl(url, dropPoint)
            return
          }
          try {
            const resp = await fetch(url)
            if (!resp.ok) return
            const blob = await resp.blob()
            if (!/^image\//.test(blob.type)) return
            const dataUrl = await new Promise((resolve, reject) => {
              const r = new FileReader(); r.onload = () => resolve(String(r.result)); r.onerror = reject; r.readAsDataURL(blob)
            })
            insertImageFromDataUrl(dataUrl, dropPoint)
          } catch (_) { /* cross-origin or offline — silently ignore */ }
        }
      })

      // Paste image from clipboard (Cmd/Ctrl+V). Works when the iframe has
      // focus — click the canvas first if paste seems unresponsive.
      window.addEventListener('paste', async (e) => {
        const items = Array.from(e.clipboardData?.items || [])
        const imageItem = items.find(i => i.kind === 'file' && /^image\//.test(i.type))
        if (!imageItem) return
        const file = imageItem.getAsFile()
        if (!file) return
        e.preventDefault()
        try {
          const url = await fileToDataUrl(file)
          insertImageFromDataUrl(url, null)
        } catch (_) { /* ignore */ }
      })

      // ── Status ───────────────────────────────────────────────────────────
      function flushStatus() {
        statusEl.textContent = shapes.length === 0 ? 'empty' : (shapes.length + ' shape' + (shapes.length === 1 ? '' : 's'))
      }

      // ── Host bridge ──────────────────────────────────────────────────────
      // The host pushes `surface.requestFlush` just before sending. We keep
      // the payload fresh after every render so it's always ready.
      function exportPng() {
        if (shapes.length === 0) return null
        // Compute a tight crop of drawn content
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity
        for (const s of shapes) {
          const b = boundsOf(s)
          if (!b) continue
          const pad = (s.width || 2) + 2
          if (b.x - pad < minX) minX = b.x - pad
          if (b.y - pad < minY) minY = b.y - pad
          if (b.x + b.w + pad > maxX) maxX = b.x + b.w + pad
          if (b.y + b.h + pad > maxY) maxY = b.y + b.h + pad
        }
        if (!isFinite(minX) || !isFinite(minY)) return null
        const w = Math.max(1, Math.ceil(maxX - minX))
        const h = Math.max(1, Math.ceil(maxY - minY))
        const off = document.createElement('canvas')
        off.width = Math.ceil(w * dpr)
        off.height = Math.ceil(h * dpr)
        const octx = off.getContext('2d')
        // white background so transparent pen strokes are visible in the attached image
        octx.fillStyle = '#ffffff'
        octx.fillRect(0, 0, off.width, off.height)
        octx.translate(-minX * dpr, -minY * dpr)
        // Reuse the main draw routine by swapping ctx references
        const savedCtx = ctx
        // eslint-disable-next-line no-global-assign
        window._activeCtx = octx
        // Temporarily point our drawShape's ctx at off-screen by monkey-patching
        const origStroke = ctx.stroke
        const origFill = ctx.fill
        // Simpler: re-implement minimal draw using octx
        for (const s of shapes) {
          octx.save()
          octx.strokeStyle = s.color
          octx.fillStyle = s.color
          octx.lineWidth = (s.width || 2) * dpr
          octx.lineJoin = 'round'
          octx.lineCap = 'round'
          octx.beginPath()
          if (s.type === 'pen' || s.type === 'eraser') {
            if (s.type === 'eraser') octx.globalCompositeOperation = 'destination-out'
            if (s.points.length > 0) {
              octx.moveTo(s.points[0].x * dpr, s.points[0].y * dpr)
              for (let i = 1; i < s.points.length; i++) octx.lineTo(s.points[i].x * dpr, s.points[i].y * dpr)
              if (s.points.length === 1) {
                octx.arc(s.points[0].x * dpr, s.points[0].y * dpr, Math.max(1, s.width/2) * dpr, 0, Math.PI*2)
                octx.fill()
              }
            }
            octx.stroke()
            octx.globalCompositeOperation = 'source-over'
          } else if (s.type === 'rect') {
            octx.rect(s.x * dpr, s.y * dpr, s.w * dpr, s.h * dpr); octx.stroke()
          } else if (s.type === 'ellipse') {
            octx.ellipse((s.x + s.w/2)*dpr, (s.y + s.h/2)*dpr, Math.abs(s.w/2)*dpr, Math.abs(s.h/2)*dpr, 0, 0, Math.PI*2); octx.stroke()
          } else if (s.type === 'line') {
            octx.moveTo(s.x*dpr, s.y*dpr); octx.lineTo(s.x2*dpr, s.y2*dpr); octx.stroke()
          } else if (s.type === 'arrow') {
            const x1 = s.x*dpr, y1 = s.y*dpr, x2 = s.x2*dpr, y2 = s.y2*dpr
            octx.moveTo(x1, y1); octx.lineTo(x2, y2); octx.stroke()
            const angle = Math.atan2(y2-y1, x2-x1)
            const head = Math.max(8, s.width*3) * dpr
            octx.beginPath()
            octx.moveTo(x2, y2)
            octx.lineTo(x2 - head*Math.cos(angle - Math.PI/6), y2 - head*Math.sin(angle - Math.PI/6))
            octx.lineTo(x2 - head*Math.cos(angle + Math.PI/6), y2 - head*Math.sin(angle + Math.PI/6))
            octx.closePath(); octx.fill()
          } else if (s.type === 'image') {
            const img = imageCache.get(s.src)
            if (img && img.complete && img.naturalWidth > 0) {
              octx.drawImage(img, s.x * dpr, s.y * dpr, s.w * dpr, s.h * dpr)
            }
          }
          octx.restore()
        }
        return off.toDataURL('image/png')
      }

      function buildSketchPayload() {
        const dataUrl = exportPng()
        if (!dataUrl) return null
        const base64 = dataUrl.replace(/^data:image\/png;base64,/, '')
        return {
          kind: 'image',
          data: base64,
          dataUrl,
          mime: 'image/png',
          ext: 'png',
          label: 'Sketch screenshot',
          width: Math.round(canvas.getBoundingClientRect().width),
          height: Math.round(canvas.getBoundingClientRect().height),
          shapeCount: shapes.length,
          updatedAt: Date.now(),
        }
      }

      function publishSketchContext(payload) {
        if (!window.contex || !window.contex.context) return
        if (!payload) {
          window.contex.context.set('ctx:sketch:image', null).catch(() => {})
          window.contex.context.set('ctx:sketch:design_handoff', null).catch(() => {})
          return
        }
        window.contex.context.set('ctx:sketch:image', {
          label: payload.label,
          data: payload.data,
          dataUrl: payload.dataUrl,
          mime: payload.mime,
          width: payload.width,
          height: payload.height,
          shapeCount: payload.shapeCount,
          updatedAt: payload.updatedAt,
        }).catch(() => {})
        window.contex.context.set('ctx:sketch:design_handoff', {
          prompt: 'Use ctx:sketch:image as a visual reference in Builder. Match layout intent, annotations, arrows, and imported screenshots.',
          imageLabel: payload.label,
          width: payload.width,
          height: payload.height,
          shapeCount: payload.shapeCount,
          updatedAt: payload.updatedAt,
        }).catch(() => {})
      }

      function notifyPayload() {
        try {
          if (!window.contex || !window.contex.surface) return
          const payload = buildSketchPayload()
          if (!payload) {
            window.contex.surface.clear()
            publishSketchContext(null)
            return
          }
          window.contex.surface.setPayload({
            kind: 'image',
            data: payload.data,
            mime: payload.mime,
            ext: payload.ext,
          })
          publishSketchContext(payload)
        } catch (_) { /* ignore */ }
      }

      // When the host requests a flush right before sending, make sure the
      // very latest canvas state is pushed. notifyPayload already runs on
      // every render; respond idempotently so the host's ack handler fires.
      function waitForBridge(cb) {
        if (window.contex && window.contex.surface) return cb()
        const iv = setInterval(() => {
          if (window.contex && window.contex.surface) { clearInterval(iv); cb() }
        }, 50)
      }
      waitForBridge(() => {
        window.contex.surface.onRequestFlush(() => {
          notifyPayload()
        })
        window.contex.surface.onClear(() => {
          clearSketch()
        })
        if (window.contex.actions) {
          window.contex.actions.register('getPayload', 'Return the current sketch image payload and design handoff metadata', () => {
            const payload = buildSketchPayload()
            publishSketchContext(payload)
            return payload ? { ok: true, payload } : { ok: false, error: 'Sketch is empty' }
          })
          window.contex.actions.register('clear', 'Clear the current sketch canvas', () => {
            clearSketch()
            return { ok: true }
          })
        }
      })
    })()
  </script>
</body>
</html>
